name: Validate Cloudflare Token

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load .env file
        run: |
          if [ -f .env ]; then
            echo "CLOUDFLARE_API_TOKEN=$(grep CLOUDFLARE_API_TOKEN .env | cut -d '=' -f2)" >> $GITHUB_ENV
          else
            echo "No .env file found"
            exit 1
          fi

      - name: Validate Cloudflare Token
        run: |
          ./scripts/validate_cloudflare_token.sh
