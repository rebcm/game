name: Validar Critérios de Aceitação Deploy Cloudflare

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy Cloudflare Pages]
    types:
      - completed

jobs:
  validar-criterios-aceitacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar build web
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "Build web gerado com sucesso"
          else
            echo "Build web falhou"
            exit 1
          fi

      - name: Verificar upload via Wrangler
        run: |
          if grep -q "Upload concluído" <<< "${{ github.event.workflow_run.logs }}"; then
            echo "Upload concluído via Wrangler"
          else
            echo "Upload via Wrangler falhou"
            exit 1
          fi

      - name: Verificar URL de preview
        run: |
          url_preview=$(grep -oP 'URL de preview: \Khttps?://[^\s]+' <<< "${{ github.event.workflow_run.logs }}")
          if curl -s -f "$url_preview" > /dev/null; then
            echo "URL de preview acessível"
          else
            echo "URL de preview inacessível"
            exit 1
          fi
