name: Validar Critérios de Aceitação Deploy Cloudflare

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy Cloudflare Pages]
    types:
      - completed

jobs:
  validar-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar URL de Preview
        run: |
          URL_PREVIEW=$(cat ./preview_url.txt)
          if [ -z "$URL_PREVIEW" ]; then
            echo "URL de preview não encontrada."
            exit 1
          fi
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" $URL_PREVIEW)
          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "URL de preview retornou código $RESPONSE_CODE"
            exit 1
          fi
          echo "URL de preview validada com sucesso."
