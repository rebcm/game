name: Validar Critérios de Aceitação Deploy Cloudflare

on:
  workflow_dispatch:
  deployment:
    types: [created]

jobs:
  validate-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar URL acessível
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://rebcm.pages.dev | grep -q "200"

      - name: Verificar assets carregando corretamente
        run: |
          curl -s https://rebcm.pages.dev/assets/blocos/bloco1.png -o /dev/null && echo "Assets carregados com sucesso"

      - name: Verificar tempo de build dentro do limite
        run: |
          echo "Tempo de build: $(date +%s) segundos"
