name: Flutter Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/smoke_test/smoke_test.dart

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v3
        with:
          name: flutter-logs
          path: /home/runner/work/game/game/test_logs/
