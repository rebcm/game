name: Documentação Voice Tone Checklist Test

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guidelines/voice_tone_checklist.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar arquivo
        run: |
          if [ ! -f "docs/guidelines/voice_tone_checklist.md" ]; then
            echo "Arquivo voice_tone_checklist.md não encontrado"
            exit 1
          fi
