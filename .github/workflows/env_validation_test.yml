name: Environment Variables Validation Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run env validation test
        run: |
          flutter pub get
          flutter test test/env_validation_test/env_validation_test.dart
