name: Fail Fast Pipeline

on:
  push:
    branches:
      - main

jobs:
  fail-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Run fail fast script
        run: .github/scripts/ci_validation/fail_fast_pipeline.sh
