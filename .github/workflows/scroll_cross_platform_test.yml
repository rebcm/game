name: Scroll Cross-Platform Test

on:
  schedule:
    - cron:  '0 20 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test integration_test/scroll/scroll_cross_platform_test.dart
        continue-on-error: true
