name: Scroll Cross-Platform Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        browser: [chrome, firefox, safari]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.5'

      - name: Run Scroll Test on ${{ matrix.os }} ${{ matrix.browser }}
        run: |
          flutter config --enable-web
          flutter test integration_test/scroll_test.dart --browser ${{ matrix.browser }}
