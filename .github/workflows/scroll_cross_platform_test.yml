name: Scroll Cross-Platform Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  test-scroll:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run scroll test
        run: flutter test integration_test/scroll_test.dart

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: scroll-test-results-${{ matrix.os }}
          path: test-results.xml
