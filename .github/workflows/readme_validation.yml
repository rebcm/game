name: README Validation

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  validate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate README headers
        run: |
          if ! grep -q '^# Rebeca Game' README.md; then
            echo "README.md is missing the '# Rebeca Game' header"
            exit 1
          fi
          if ! grep -q '^## Features' README.md; then
            echo "README.md is missing the '## Features' header"
            exit 1
          fi
          if ! grep -q '^## Installation' README.md; then
            echo "README.md is missing the '## Installation' header"
            exit 1
          fi
