name: Compatibilidade Testes

on:
  push:
    branches:
      - main

jobs:
  compatibilidade-testes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Flutter Build APK/Bundle
        run: |
          flutter pub get
          flutter build apk --release

      - name: Verificar Erros de 'major version'
        run: |
          if grep -r "major version" build/app/outputs/apk/release/app-release.apk; then
            echo "Erro de 'major version' encontrado"
            exit 1
          fi

      - name: Verificar Tempo de Build
        run: |
          build_time=$(flutter build apk --release --verbose | grep "Built build/app/outputs/apk/release/app-release.apk" | awk '{print $NF}' | sed 's/[^0-9]*//g')
          if [ $build_time -gt 300 ]; then
            echo "Tempo de build superior a 300 segundos"
            exit 1
          fi

      - name: Sincronização Gradle
        run: |
          ./gradlew --version
          if ./gradlew assembleRelease | grep -i "warning"; then
            echo "Warnings durante a sincronização Gradle"
            exit 1
          fi
