name: Integracao Continua Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'
      - name: Run tests
        run: |
          flutter pub get
          flutter test test/integracao_continua/ci_test.dart
