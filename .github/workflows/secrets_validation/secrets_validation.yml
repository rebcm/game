name: Secrets Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secrets
        run: |
          if [ -z "${API_KEY}" ]; then
            echo "API_KEY is not set"
            exit 1
          fi
          if [ -z "${SECRET_KEY}" ]; then
            echo "SECRET_KEY is not set"
            exit 1
          fi
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
