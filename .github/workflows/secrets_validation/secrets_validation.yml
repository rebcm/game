name: Secrets Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Secrets
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          if [ -z "$SECRET_KEY" ]; then
            echo "Error: Secrets are not configured properly"
            exit 1
          fi
