name: Deploy Test - Validação de Conteúdo

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --flavor=web

      - name: Validate Flutter View
        run: |
          curl -s -f http://localhost:8080/index.html | grep '<flutter-view>'
