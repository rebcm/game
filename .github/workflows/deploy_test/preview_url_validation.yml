name: Preview URL Validation

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types:
      - completed

jobs:
  validate-preview-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Preview URL
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          response_code=$(curl -s -o /dev/null -w "%{http_code}" $PREVIEW_URL)
          if [ "$response_code" -eq 200 ]; then
            echo "Preview URL is accessible"
            exit 0
          else
            echo "Preview URL is not accessible"
            exit 1
          fi
