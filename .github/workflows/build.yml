name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Java Home
        run: .github/scripts/validate_java_home.sh

      - name: Build and test
        run: |
          flutter pub get
          flutter analyze
          flutter test
