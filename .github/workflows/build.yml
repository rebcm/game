name: Build e Deploy — Jogo da Rebeca

on:
  schedule:
    - cron: '0 23 * * *'  # 20:00 BRT = 23:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test
      - run: flutter build web --release
      - name: Deploy para Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -X POST \
          "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/rebcm-game/deployments" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data '{"branch":"main","working_directory":"/web"}'

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK como artifact
        uses: actions/upload-artifact@v3
        with:
          name: rebcm-android.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter build ios --no-codesign
      - name: Upload IPA como artifact
        uses: actions/upload-artifact@v3
        with:
          name: rebcm-ios.ipa
          path: build/ios/ipa/RebecaCriativa.ipa

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - run: npm install -g wrangler
      - run: wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify:
    needs: [build-web, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: POST para Neuron API notificando resultado do build
        env:
          NEURON_API_URL: ${{ secrets.NEURON_API_URL }}
        run: |
          curl -X POST \
          "${NEURON_API_URL}" \
          -H "Content-Type: application/json" \
          --data '{"status":"success","project":"rebcm/game"}'
