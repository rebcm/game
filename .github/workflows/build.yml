name: Build e Deploy — Jogo da Rebeca

on:
  schedule:
    - cron: '0 23 * * *'  # 20:00 BRT = 23:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: dart analyze

      - name: flutter test
        run: flutter test

      - name: flutter build web --release
        run: flutter build web --release

      - name: Deploy para Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=construcao-criativa

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build apk --release
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build ios --no-codesign
        run: flutter build ios --no-codesign

      - name: Upload IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner.ipa
          path: build/ios/iphoneos/Runner.ipa

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: npm install -g wrangler
        run: npm install -g wrangler

      - name: wrangler deploy
        working-directory: workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify:
    needs: [build-web, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: POST para Neuron API notificando resultado do build
        run: |
          curl -X POST \
          https://api.neuron.com/endpoint \
          -H 'Content-Type: application/json' \
          -d '{"status": "success"}'
