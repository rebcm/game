name: Build e Deploy — PassDriver

on:
  schedule:
    - cron: '0 23 * * *'  # 20:00 BRT = 23:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release
      - name: Deploy para Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'passdriver'
          directory: 'build/web'

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: passdriver.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'
      - run: flutter pub get
      - run: flutter build ios --no-codesign
      - name: Upload IPA como artifact
        uses: actions/upload-artifact@v4
        with:
          name: passdriver.ipa
          path: build/ios/iphoneos/PassDriver.app

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: npm install -g wrangler
        run: npm install -g wrangler
      - name: wrangler deploy
        run: wrangler deploy
        working-directory: ./backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify:
    needs: [build-web, build-android, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: POST para Neuron API notificando resultado do build
        run: curl -X POST https://neuron-api.example.com/build-result
