name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Secrets
        uses: ./.github/workflows/secrets_validation/validate_secrets.yml

      - name: Build and test
        run: |
          flutter pub get
          flutter test
