name: Validar Integração do Script de Retenção

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/retencao_test/**'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  validar-retencao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Executar teste de retenção
        run: flutter drive --target=test_driver/app.dart --driver=test_driver/retencao_test.dart
