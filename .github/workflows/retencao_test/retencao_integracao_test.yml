name: Retenção Integração Test

on:
  workflow_dispatch:

jobs:
  retencao-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration test
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/retencao_test.dart
