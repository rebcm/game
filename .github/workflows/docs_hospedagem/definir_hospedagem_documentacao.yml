name: Definir Hospedagem da Documentação

on:
  workflow_dispatch:
    inputs:
      docs-location:
        description: 'Localização da documentação (README ou Wiki)'
        required: true
        default: 'README'

jobs:
  definir-hospedagem:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Definir hospedagem
        run: |
          if [ "${{ github.event.inputs.docs-location }}" == "README" ]; then
            echo "Hospedagem definida para README.md"
            # Lógica para configurar README.md
          elif [ "${{ github.event.inputs.docs-location }}" == "Wiki" ]; then
            echo "Hospedagem definida para Wiki"
            # Lógica para configurar Wiki
          else
            echo "Opção inválida"
            exit 1
          fi
