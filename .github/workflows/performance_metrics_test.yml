name: Performance Metrics Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run performance metrics test
        run: |
          flutter drive --target=integration_test/performance_metrics_test/flutter_driver_metrics_test.dart --driver=test_driver/integration_test.dart --profile
