name: Performance Metrics Test

on:
  push:
    branches:
      - main

jobs:
  performance-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run performance test
        run: |
          flutter drive --target=test/performance/performance_test.dart --driver=test/performance/driver.dart --profile
