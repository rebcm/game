name: Responsividade Test

on:
  push:
    branches:
      - main

jobs:
  responsividade-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run responsividade test
        run: |
          flutter test test/responsividade_test/tela_pequena_test.dart
