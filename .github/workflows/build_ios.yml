name: Build iOS

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Build iOS
        run: ./.github/scripts/build_ios.sh

      - name: Build IPA
        run: ./.github/scripts/build_ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: runner.ipa
          path: ./build/ios/ipa/Runner.ipa
