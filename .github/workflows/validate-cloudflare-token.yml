name: Validate Cloudflare Token

on:
  push:
    branches:
      - main

jobs:
  validate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Load .env file
        run: |
          cp .env.example .env

      - name: Validate Cloudflare Token
        run: ./scripts/validate_cloudflare_token.sh
