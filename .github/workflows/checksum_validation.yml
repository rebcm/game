name: Checksum Validation

on:
  push:
    branches:
      - main

jobs:
  checksum-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run Checksum Test
        run: |
          bash scripts/run_checksum_test.sh
