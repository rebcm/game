name: HTTPS Validation Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  https-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate HTTPS
        run: |
          curl -s -f -I https://example.com/preview > /dev/null
          if [ $? -eq 0 ]; then
            echo "HTTPS validation successful"
          else
            echo "HTTPS validation failed"
            exit 1
          fi
