name: Flutter CI/CD

on:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and test
        run: flutter test

      - name: Analyze code
        run: flutter analyze

      - name: Deploy to staging
        uses: appleboy/scp-action@v2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_PRIVATE_KEY }}
          source: "build/app/outputs/apk/release/app-release.apk"
          target: "/home/${{ secrets.STAGING_USERNAME }}/apps/passdriver.apk"

      - name: Deploy to production
        uses: appleboy/scp-action@v2
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_PRIVATE_KEY }}
          source: "build/app/outputs/apk/release/app-release.apk"
          target: "/home/${{ secrets.PRODUCTION_USERNAME }}/apps/passdriver.apk"
        if: github.event_name == 'workflow_dispatch'

