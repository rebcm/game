name: Flutter CI/CD

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 23 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        run: .github/workflows/scripts/download-with-retry.sh https://example.com/artifact artifact.zip

      - name: Unzip artifact
        run: unzip artifact.zip

      - name: Build and deploy
        run: |
          flutter pub get
          flutter build web --release
          # deploy commands here
