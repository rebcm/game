name: Audio Codec Compatibility Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.0'

      - name: Run audio codec compatibility test
        run: |
          flutter test test/audio_codec_compatibility_test/audio_codec_compatibility_test.dart
