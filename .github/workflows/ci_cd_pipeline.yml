name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run build runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/smoke_test/smoke_test.dart

      - name: Deploy
        run: echo "Deploying to production"

  rollback:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Rollback to previous version
        run: |
          git fetch --prune --unshallow
          git tag -l | sort -V | tail -n 2 | head -n 1 | xargs git checkout
          echo "Rolled back to previous version"
