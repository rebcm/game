name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Flutter tests
        run: |
          flutter pub get
          flutter test

      - name: Validate JDK version
        run: |
          java -version

      - name: Validate JDK version
        run: ./scripts/validate_jdk_version.sh
