name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run build runner
        run: ./scripts/run_build_runner.sh

      - name: Run smoke test
        run: bash scripts/run_smoke_test_with_retry.sh

      - name: Deploy if smoke test passes
        if: success()
        run: echo "Deploying to production"

      - name: Rollback if smoke test fails
        if: failure()
        run: echo "Rolling back to previous version"
