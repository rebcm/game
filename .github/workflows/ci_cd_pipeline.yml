name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and deploy to Cloudflare Pages
        run: |
          # Existing deploy command here
          echo "Deploying to Cloudflare Pages..."
          # For demonstration purposes, assume the deploy URL is stored in an environment variable
          DEPLOY_URL=${{ secrets.CLOUDFLARE_PAGES_URL }}

      - name: Run smoke test
        run: .github/workflows/scripts/smoke_test.sh $DEPLOY_URL
