name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Analyze code
        run: |
          dart analyze

      - name: Run tests
        run: |
          flutter test

