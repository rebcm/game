name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Secrets
        uses: ./.github/workflows/secrets_validation/secrets_check.yml

      - name: Run Flutter Tests
        run: |
          flutter test

      - name: Build Flutter Web
        run: |
          flutter config --enable-web
          flutter build web
