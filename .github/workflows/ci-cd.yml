name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: flutter test

      - name: Build project
        run: flutter build web

      - name: Validate criteria
        uses: ./.github/workflows/checklists/validacao_criterios_aceitacao_tecnicos.yml
