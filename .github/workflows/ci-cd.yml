name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Secrets
        uses: ./.github/workflows/secrets_validation

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build and test
        run: |
          flutter build
          flutter test
