name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run cold boot script
        run: .github/scripts/cold_boot.sh

      - name: Run tests
        run: flutter test
