name: Integration Test - Frame Sync

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.0'

      - name: Run integration test
        run: |
          flutter drive --target=test/integration_tests/frame_sync_test.dart --driver=test_driver/integration_test.dart
