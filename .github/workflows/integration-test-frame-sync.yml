name: Integração - Sincronização Frame Flame

on:
  push:
    branches:
      - main

jobs:
  test-frame-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter test lib/testes/integracao/flame_loop_sincronizacao_test.dart
