name: Integração - Sincronização de Frames

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run integration test
        run: |
          flutter drive --target=test/integration_test/frame_sync_test.dart --driver=test_driver/integration_test.dart
