name: Flutter Doctor Test

on:
  push:
    branches:
      - main

jobs:
  flutter-doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Doctor
        run: .github/scripts/docs_validation/validate_flutter_doctor.sh

      - name: Upload Flutter Doctor errors
        uses: actions/upload-artifact@v3
        with:
          name: flutter_doctor_errors.md
          path: flutter_doctor_errors.md
