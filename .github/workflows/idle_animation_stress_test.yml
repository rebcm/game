    name: Validate Secrets
    
name: Idle Animation Stress Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  stress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'

      - name: Run stress test
        run: |
          flutter drive --target=test_driver/stress_test/idle_animation_stress_test.dart --driver=test_driver/stress_test/idle_animation_stress_test_driver.dart
