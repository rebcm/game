    name: Validate Secrets
    
name: Optimize Audio Assets

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  optimize-audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Optimize audio assets
        run: ./scripts/optimize_audio.sh
