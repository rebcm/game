name: Optimize Audio Assets

on:
  push:
    branches:
      - main

jobs:
  optimize-audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Optimize audio assets
        run: ./scripts/optimize_audio.sh
