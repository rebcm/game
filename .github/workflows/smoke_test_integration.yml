name: Smoke Test Integration

on:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run smoke test
        run: ./.github/scripts/smoke_test.sh

      - name: Check smoke test status
        run: |
          status=$(cat smoke_test_status.txt)
          if [ "$status" != "200" ]; then
            echo "Smoke test failed with status $status"
            exit 1
          fi

      - name: Notify team on failure
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: '{"text": "Smoke test failed in CI/CD pipeline"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: failure()
