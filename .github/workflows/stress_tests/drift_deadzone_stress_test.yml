name: Drift Deadzone Stress Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  stress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run drift deadzone stress test
        run: |
          flutter drive --target=test_driver/drift_deadzone_stress_test.dart --driver=test_driver/drift_deadzone_stress_test_driver.dart
