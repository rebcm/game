name: Flutter CI Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run Flutter CI Test
        run: |
          flutter pub get
          flutter config --enable-web
          flutter test integration_test/flutter_ci_test.dart
