name: Flame Audio Version Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run flutter pub get
        run: flutter pub get
      - name: Check flame_audio version compatibility
        run: |
          flutter pub deps | grep flame_audio
