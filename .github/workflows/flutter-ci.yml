name: Flutter CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run coverage test
        run: |
          flutter pub get
          flutter drive --driver=test/integration_tests/coverage_test/coverage_test_driver.dart --target=test/integration_tests/coverage_test/coverage_test.dart --profile --coverage
          genhtml -o coverage coverage/lcov.info
          echo "Coverage: $(lcov --summary coverage/lcov.info | grep 'lines...' | awk '{print $2}' | sed 's/[^0-9.]//g')%"
          if (( $(echo "$(lcov --summary coverage/lcov.info | grep 'lines...' | awk '{print $2}' | sed 's/[^0-9.]//g') >= 80" | bc -l) )); then
            echo "Coverage threshold passed"
          else
            echo "Coverage threshold failed"
            exit 1
          fi
