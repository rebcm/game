name: Preview Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter config --enable-web && flutter build web --release --base-href /game/${GITHUB_REF_NAME}/

      - name: Deploy to preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: preview
          keep_files: true
          cname: ${{ secrets.CLOUDFLARE_PREVIEW_CNAME }}
          commit_message: "Deploy preview for ${GITHUB_REF_NAME}"
