name: Preview Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and deploy preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          flutter config --enable-web
          flutter build web --release --base-href /preview/${GITHUB_HEAD_REF}/
          mkdir -p preview/${GITHUB_HEAD_REF}
          mv build/web/* preview/${GITHUB_HEAD_REF}/
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add preview/${GITHUB_HEAD_REF}
          git commit -m "Deploy preview for ${GITHUB_HEAD_REF}"
          git push origin preview/${GITHUB_HEAD_REF}
