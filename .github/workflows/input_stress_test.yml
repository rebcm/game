name: Input Stress Test

on:
  push:
    branches:
      - main

jobs:
  input_stress_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run input stress test
        run: |
          flutter drive --driver=test/integration_tests/input_stress_test/input_stress_test.dart --target=lib/main.dart
