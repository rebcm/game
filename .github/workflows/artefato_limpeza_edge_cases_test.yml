name: Artefato Limpeza Edge Cases Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run edge cases tests for artifact cleanup
        run: |
          flutter pub get
          flutter test test/artefato_limpeza_edge_cases_test.dart
