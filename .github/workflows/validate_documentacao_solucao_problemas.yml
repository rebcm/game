name: Validate Documentação Solução Problemas

on:
  push:
    paths:
      - 'docs/solucao_problemas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Markdown
        run: |
          markdownlint docs/solucao_problemas/README.md

