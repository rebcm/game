name: Jank Test

on:
  push:
    branches:
      - main

jobs:
  jank-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run jank test
        run: flutter test lib/testes/performance/jank_test.dart
