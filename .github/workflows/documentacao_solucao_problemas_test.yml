name: Testar Documentação de Solução de Problemas

on:
  push:
    branches:
      - main
    paths:
      - 'docs/solucao_problemas/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar documentação
        run: |
          echo "Verificando documentação em docs/solucao_problemas/"
          find docs/solucao_problemas/ -type f -name '*.md' -exec echo "Verificado: {}" \;
