name: Chunking Stress Test

on:
  schedule:
    - cron:  '0 20 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run chunking stress test
        run: |
          flutter test lib/testes/stress/chunking_stress_test.dart
