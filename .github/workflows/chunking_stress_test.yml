name: Chunking Stress Test

on:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'
      - run: flutter pub get
      - run: flutter test test/stress_tests/chunking_stress_test.dart
