name: Validate Build Artifact

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: build-artifact
          path: build-artifact

      - name: Validate artifact
        run: |
          chmod +x .github/workflows/scripts/validate_binary_version.sh
          .github/workflows/scripts/validate_binary_version.sh build-artifact/rebcm.apk
