name: Validate Build Artifact

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate build artifact
        run: .github/workflows/scripts/validate_build_artifact.sh
