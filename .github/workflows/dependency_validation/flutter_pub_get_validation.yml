name: Flutter Pub Get Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  validate-pub-get:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run flutter pub get
        run: |
          flutter pub get
          if [ $? -ne 0 ]; then
            echo "Flutter pub get failed"
            exit 1
          fi

      - name: Check for errors
        run: |
          dart analyze
          if [ $? -ne 0 ]; then
            echo "Dart analyze found errors"
            exit 1
          fi
