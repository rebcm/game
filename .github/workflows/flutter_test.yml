name: Flutter Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          flutter pub get
          ./.github/scripts/docs_validation/dicas_responsividade/validate_dicas_responsividade.sh
