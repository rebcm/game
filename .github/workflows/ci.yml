name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mask secrets
        run: ./.github/scripts/ci_validation/secrets_masking/mask_secrets.sh

      - name: Run dart analyze
        run: dart analyze

      # Add more steps as needed
