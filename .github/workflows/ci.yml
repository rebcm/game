name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - run: flutter --version

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'

      - run: java -version

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test
