name: Configure Secrets

on:
  workflow_dispatch:

jobs:
  configure-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure wrangler.toml
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cat > wrangler.toml << EOL
          name = "rebcm-worker"
          main = "src/index.js"
          compatibility_date = "2023-01-01"
          account_id = "$CF_ACCOUNT_ID"

          [vars]
          DB_URL = "$DB_URL"
          DB_USER = "$DB_USER"
          DB_PASSWORD = "$DB_PASSWORD"
          EOL

      - name: Set secrets via wrangler
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          wrangler secret put DB_URL --env production <<< "$DB_URL"
          wrangler secret put DB_USER --env production <<< "$DB_USER"
          wrangler secret put DB_PASSWORD --env production <<< "$DB_PASSWORD"
