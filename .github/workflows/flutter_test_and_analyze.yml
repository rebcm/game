name: Flutter Test and Analyze

on:
  push:
    branches:
      - main

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Run flutter test and analyze
        run: |
          flutter pub get
          flutter test
          flutter analyze
