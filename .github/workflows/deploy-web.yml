name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy build/web --project-name=construcao-criativa

      - name: Validate deploy
        run: .github/workflows/scripts/validate_deploy.sh https://construcao-criativa.pages.dev
