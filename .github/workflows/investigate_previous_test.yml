name: Investigate Previous Test Failure

on:
  workflow_dispatch:
    inputs:
      previous_run_id:
        description: 'ID da execução anterior'
        required: true

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download previous test logs
        uses: actions/download-artifact@v3
        with:
          name: test-logs-${{ github.event.inputs.previous_run_id }}
          path: test-logs

      - name: Analyze logs
        run: |
          echo "Analyzing logs..."
          cat test-logs/*.log

      - name: Upload analysis results
        uses: actions/upload-artifact@v3
        with:
          name: analysis-results
          path: analysis-results.txt
