name: Integracao API Staging Test

on:
  push:
    branches:
      - main

jobs:
  integracao-api-staging-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run integration test against staging API
        run: |
          flutter pub get
          flutter test integration_test/integracao_api_staging_test.dart
        env:
          API_URL: ${{ secrets.STAGING_API_URL }}
