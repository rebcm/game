name: Integracao API Staging Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  integracao-api-staging-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests against staging API
        env:
          API_URL: https://staging.example.com/api
        run: flutter drive --target=test_driver/app.dart --driver=test_driver/integration_test.dart --flavor=staging
