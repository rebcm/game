name: build-ios

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and upload IPA
        run: .github/scripts/build_ios.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
