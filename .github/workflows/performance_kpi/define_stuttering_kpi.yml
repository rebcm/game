name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in seconds'
        required: true
        default: '60'
      fps_threshold:
        description: 'FPS threshold for stuttering'
        required: true
        default: '55'

jobs:
  define_stuttering_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Flutter test
