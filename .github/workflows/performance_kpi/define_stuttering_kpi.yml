name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in seconds'
        required: true
        default: '60'
      fps_threshold:
        description: 'FPS threshold for stuttering'
        required: true
        default: '55'

jobs:
  define_stuttering_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Run Flutter driver test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --profile --trace-startup --verbose
        env:
          TEST_DURATION: ${{ github.event.inputs.test_duration }}
          FPS_THRESHOLD: ${{ github.event.inputs.fps_threshold }}

      - name: Parse test results
        run: |
          # TO DO: implement parsing logic here
          echo "Parsing test results..."
