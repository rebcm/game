name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      fps_threshold:
        description: 'FPS Threshold'
        required: true
        default: '55'
      jank_frames_threshold:
        description: 'Jank Frames Threshold'
        required: true
        default: '10'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  define_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define KPI
        run: |
          echo "FPS Threshold: ${{ github.event.inputs.fps_threshold }}"
          echo "Jank Frames Threshold: ${{ github.event.inputs.jank_frames_threshold }}"
          echo "Stuttering KPI defined successfully"

      - name: Store KPI
        run: |
          echo "${{ github.event.inputs.fps_threshold }}" > .github/workflows/performance_kpi/fps_threshold.txt
          echo "${{ github.event.inputs.jank_frames_threshold }}" > .github/workflows/performance_kpi/jank_frames_threshold.txt
