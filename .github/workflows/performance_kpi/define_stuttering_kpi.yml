name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in seconds'
        required: true
        default: '60'
      fps_threshold:
        description: 'FPS threshold'
        required: true
        default: '55'

jobs:
  define_stuttering_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run Flutter test
        run: |
          flutter pub get
          flutter test integration_test/stuttering_test.dart --dart-define=test_duration=${{ github.event.inputs.test_duration }} --dart-define=fps_threshold=${{ github.event.inputs.fps_threshold }}

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test_results.json
