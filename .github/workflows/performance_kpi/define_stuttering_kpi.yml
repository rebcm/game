name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      fps_threshold:
        description: 'FPS Threshold'
        required: true
        default: '55'
      jank_frames_threshold:
        description: 'Jank Frames Threshold'
        required: true
        default: '10'

jobs:
  define_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define Stuttering KPI
        run: |
          echo "FPS Threshold: ${{ github.event.inputs.fps_threshold }}"
          echo "Jank Frames Threshold: ${{ github.event.inputs.jank_frames_threshold }}"
          echo "Stuttering KPI defined successfully"

      - name: Save KPI to file
        run: |
          mkdir -p performance_kpi
          echo "fps_threshold=${{ github.event.inputs.fps_threshold }}" > performance_kpi/stuttering_kpi.txt
          echo "jank_frames_threshold=${{ github.event.inputs.jank_frames_threshold }}" >> performance_kpi/stuttering_kpi.txt

      - name: Upload KPI file
        uses: actions/upload-artifact@v3
        with:
          name: stuttering_kpi
          path: performance_kpi/stuttering_kpi.txt
