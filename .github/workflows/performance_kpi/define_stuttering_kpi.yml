name: Define Stuttering KPI

on:
  workflow_dispatch:
    inputs:
      test-duration:
        description: 'Test duration in seconds'
        required: true
        default: '60'
      fps-threshold:
        description: 'FPS threshold for stuttering'
        required: true
        default: '55'

jobs:
  define-stuttering-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Flutter test
        run: |
          flutter run --release --test --duration ${{ github.event.inputs.test-duration }}

      - name: Calculate FPS
        run: |
          fps=$(cat test_logs.txt | grep 'FPS' | awk '{print $2}' | awk -F '.' '{print $1}')
          echo "Average FPS: $fps"

      - name: Check stuttering
        run: |
          if (( $fps < ${{ github.event.inputs.fps-threshold }} )); then
            echo "Stuttering detected!"
            exit 1
          else
            echo "No stuttering detected."
          fi
