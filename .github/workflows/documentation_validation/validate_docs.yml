name: Validate Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'assets/docs/**'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/rebcm/flutter-env:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Validate Documentation Checklist
        run: |
          if ! grep -q "documentacao-validacao-checklist.md" assets/docs/checklists/validacao-onboarding-checklist.md; then
            echo "Documentation checklist not found"
            exit 1
          fi

      - name: Run Flutter Doctor
        run: flutter doctor

      - name: Validate Docs Commands
        run: |
          passdriver flutter pub get
          passdriver flutter pub run build_runner build --delete-conflicting-outputs
