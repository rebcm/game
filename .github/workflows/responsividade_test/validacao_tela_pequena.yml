name: Validacao Tela Pequena

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Driver Test
        run: |
          flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart --device=iphone_se
