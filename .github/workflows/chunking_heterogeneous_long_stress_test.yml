name: Chunking Heterogeneous Long Stress Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run test
        run: |
          flutter drive --target=test/integration_tests/long_stress_test/chunk_heterogeneous_long_stress_test.dart --driver=test_driver/integration_test.dart
