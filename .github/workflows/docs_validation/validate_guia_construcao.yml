name: Validate Construction Guide Template

on:
  push:
    branches:
      - main
    paths:
      - docs/guia_construcao/template.md

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate construction guide template
        run: .github/scripts/docs_validation/guia_construcao/validate_guia_construcao_template.sh
