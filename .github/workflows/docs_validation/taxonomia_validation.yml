name: Taxonomia Validation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/taxonomia/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate taxonomia
        run: |
          if grep -q 'TODO' docs/taxonomia/categorias.md; then
            echo "TODO found in categorias.md"
            exit 1
          fi
