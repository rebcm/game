name: Validate Dicas

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guias/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate dicas style
        run: |
          ./.github/scripts/docs_validation/validate_tone_and_style.sh docs/guias/estilo_dicas.md
