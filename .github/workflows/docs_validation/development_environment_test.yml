name: Desenvolvimento Ambiente Validação

on:
  push:
    branches:
      - main
    paths:
      - 'docs/development-environment/**'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate README.md
        run: |
          cd docs/development-environment
          if ! grep -q "Ambiente de Desenvolvimento" README.md; then
            echo "README.md não contém o título 'Ambiente de Desenvolvimento'"
            exit 1
          fi
