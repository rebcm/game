name: Definir Baselines de Performance

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  definir-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Run performance test
        run: flutter drive --target=test_driver/app.dart --driver=test_driver/performance_test.dart --profile --no-sandbox

      - name: Parse performance results
        run: |
          fps=$(cat performance_results.json | jq '.["average_fps"]')
          jank_frames=$(cat performance_results.json | jq '.["jank_frames"]')
          echo "FPS: $fps, Jank Frames: $jank_frames"
          if (( $(echo "$fps < 55" | bc -l) )); then
            echo "FPS baseline not met"
            exit 1
          fi
          if (( $(echo "$jank_frames > 10" | bc -l) )); then
            echo "Jank frames baseline not met"
            exit 1
          fi
