name: Release

on:
  schedule:
    - cron:  '0 23 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and release
        run: |
          echo "Building and releasing..."
          # existing build and release steps here

      - name: Purge old artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${GITHUB_REPOSITORY}
          BRANCH: main
        run: |
          curl -sL https://raw.githubusercontent.com/rebcm/game/main/.github/workflows/scripts/purge-artifacts.sh | bash
