name: Release

on:
  schedule:
    - cron: '0 23 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        run: |
          .github/workflows/scripts/download-with-retry.sh https://example.com/artifact artifact.zip

      - name: Process artifact
        run: |
          unzip artifact.zip
          # Process the artifact

      - name: Upload release
        uses: actions/upload-artifact@v3
        with:
          name: release
          path: processed-artifact
