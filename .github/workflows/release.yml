name: Release

on:
  schedule:
    - cron:  '0 23 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Build and release
        run: |
          flutter pub get
          flutter build apk --release
          .github/workflows/scripts/validate_binary_version.sh
          .github/workflows/scripts/validate_checksum.sh
