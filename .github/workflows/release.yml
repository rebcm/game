name: Release Diário

on:
  schedule:
    - cron: '0 23 * * *'  # 20:00 BRT (UTC-3)
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Dependências
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Decodificar keystore
        if: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/rebeca.jks

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)" \
            --build-number="${{ github.run_number }}"
        env:
          ANDROID_KEYSTORE_PATH: android/app/rebeca.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --build-number="${{ github.run_number }}"
        env:
          ANDROID_KEYSTORE_PATH: android/app/rebeca.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: iOS (não assinado)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Dependências
        run: flutter pub get

      - name: Build iOS (sem assinatura)
        run: |
          flutter build ios --release --no-codesign \
            --build-number="${{ github.run_number }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  deploy-web:
    name: Web → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Dependências
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href=/

      - name: Deploy Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b49966e4988319be806b465fef646d81
          command: pages deploy build/web --project-name=construcao-criativa --commit-dirty=true

  create-release:
    name: Criar Release
    runs-on: ubuntu-latest
    needs: [build-android, deploy-web]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download artefatos Android
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/

      - name: Criar tag de release
        id: tag
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          DATE=$(date -u '+%Y%m%d')
          TAG="v${VERSION}-daily-${DATE}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publicar Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Construção Criativa ${{ steps.tag.outputs.version }} — Build ${{ github.run_number }}"
          body: |
            ## Construção Criativa da Rebeca

            **Autora:** Rebeca Alves Moreira
            **Data:** ${{ steps.tag.outputs.tag }}
            **Build:** #${{ github.run_number }}

            ### Downloads
            - **Android APK**: instalar diretamente no Android
            - **Web**: https://construcao-criativa.pages.dev

            ### O que é o jogo
            Jogo de blocos voxel modo criativo puro. Construa livremente com todos os blocos disponíveis.
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
