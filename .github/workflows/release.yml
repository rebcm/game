name: Release

on:
  schedule:
    - cron: '0 23 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate artifact matrix
        uses: ./.github/workflows/validate-artifact-matrix.yml

      - name: Build and upload artifacts
        run: |
          # Existing build and upload logic
          echo "Building and uploading artifacts..."

      - name: Validate checksum
        run: |
          .github/workflows/scripts/validate_checksum.sh artifact.zip expected_checksum

      - name: Validate binary version
        run: |
          .github/workflows/scripts/validate_binary_version.sh artifact binary_version
