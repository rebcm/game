name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flutter build apk --release
          flutter build ios --release --no-codesign
          gh release create ${GITHUB_REF_NAME} --title ${GITHUB_REF_NAME} --notes "Automated release" build/app/outputs/flutter-apk/app-release.apk build/ios/iphoneos/Runner.app
