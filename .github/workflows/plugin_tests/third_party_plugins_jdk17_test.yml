name: Testar Compatibilidade de Plugins com JDK 17

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test-plugins-jdk17:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
          channel: 'stable'

      - name: Run Flutter tests with JDK 17
        run: |
          flutter pub get
          flutter config --enable-android
          flutter doctor
          flutter test --dart-define=JAVA_HOME=$JAVA_HOME
