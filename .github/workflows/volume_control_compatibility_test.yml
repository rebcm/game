name: Volume Control Compatibility Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.3.10'

      - name: Run Flutter Drive Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/volume_control_test.dart
