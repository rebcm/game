    name: Validate Secrets
    
name: Flutter Render Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=test_driver/integration_test.dart --driver=test_driver/integration_test_driver.dart

      - name: Validate Flutter Render
        run: |
          curl -s -o response.html http://localhost:8080/index.html
          if grep -q "<flutter-view>" response.html; then
            echo "Flutter app rendered successfully"
          else
            echo "Flutter app failed to render"
            exit 1
          fi
