name: Smoke Test

on:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Smoke Test
        run: |
          flutter drive --target=test_driver/smoke_test/main.dart --driver=test_driver/smoke_test/main_test.dart --flavor=web
