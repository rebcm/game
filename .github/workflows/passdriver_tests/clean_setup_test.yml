name: Clean Setup Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Create Cloudflare API Token
        run: |
          echo "Create a new Cloudflare API Token following the guide: https://dash.cloudflare.com/profile/api-tokens"
          echo "Then, save it as a secret named CLOUDFLARE_API_TOKEN"

      - name: Validate Cloudflare API Token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json"

      - name: Run passdriver flutter test
        run: |
          flutter config --enable-web
          flutter pub get
          flutter test test/passdriver_flutter_test.dart

      - name: Validate CI/CD Pipeline
        run: |
          echo "Validating CI/CD pipeline..."
          # Add validation logic here
