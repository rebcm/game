name: Validar Artefato de Build Final

on:
  workflow_dispatch:
  workflow_run:
    workflows: [flutter-build.yml]
    types:
      - completed

jobs:
  validar-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: build-artifact
          path: build/

      - name: Validate artifact
        run: |
          flutter pub get
          flutter test integration_test/validar_artefato_test.dart

      - name: Deploy to staging
        run: |
          # Implement staging deployment logic here
          echo "Deploying to staging environment"

