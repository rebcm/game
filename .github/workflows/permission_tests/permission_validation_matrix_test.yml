name: Permissão Concedida vs Resultado do Pipeline

on:
  workflow_dispatch:

jobs:
  validate-permission:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Testar permissão concedida
        run: |
          echo "Simulando teste de permissão concedida..."
          # Implementar lógica para testar permissão concedida

      - name: Testar permissão negada
        run: |
          echo "Simulando teste de permissão negada..."
          # Implementar lógica para testar permissão negada

      - name: Gerar matriz de validação
        run: |
          echo "Permissão Concedida,Resultado do Pipeline" > matrix.csv
          echo "Sim,Sucesso" >> matrix.csv
          echo "Não,Erro 403" >> matrix.csv
          cat matrix.csv

      - name: Upload da matriz
        uses: actions/upload-artifact@v3
        with:
          name: permission-validation-matrix
          path: matrix.csv
