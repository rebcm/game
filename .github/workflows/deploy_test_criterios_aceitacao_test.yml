name: Deploy Test Critérios Aceitação

on:
  push:
    branches:
      - main

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Wrangler CLI
        run: npm install -g @cloudflare/wrangler

      - name: Configure Secrets
        run: |
          wrangler secret put CF_API_TOKEN ${{ secrets.CF_API_TOKEN }}
          wrangler secret put CF_ACCOUNT_ID ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy --project-name=rebcm-game --token=${{ secrets.CF_API_TOKEN }}

      - name: Validate Deployment
        run: |
          # Implement validation logic here
          echo "Validating deployment..."
