name: Deploy Test Critérios Aceitação

on:
  workflow_dispatch:

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rebcm-game
          directory: build/web

      - name: Verify Deployment
        run: |
          URL=$(curl -s -o /dev/null -w "%{redirect_url}" https://rebcm-game.pages.dev)
          if [ -z "$URL" ]; then
            echo "URL de preview não encontrada"
            exit 1
          fi
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" $URL)
          if [ "$STATUS_CODE" != "200" ]; then
            echo "Status code não é 200 OK: $STATUS_CODE"
            exit 1
          fi
