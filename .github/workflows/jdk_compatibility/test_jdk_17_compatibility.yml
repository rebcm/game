name: Test JDK 17 Compatibility

on:
  push:
    branches:
      - main

jobs:
  test-jdk-17:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Flutter tests
        run: |
          flutter pub get
          flutter test
