name: Documentação Instalação Test

on:
  push:
    branches:
      - main
    paths:
      - 'docs/instalacao/**'

jobs:
  test-documentacao-instalacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar critérios de aceitação
        run: |
          if grep -q "Versão do Flutter" docs/instalacao/criterios_aceitacao.md && \
             grep -q "Versão do Dart SDK" docs/instalacao/criterios_aceitacao.md && \
             grep -q "Configuração de Emulador" docs/instalacao/criterios_aceitacao.md && \
             grep -q "Variáveis de Ambiente" docs/instalacao/criterios_aceitacao.md; then
            echo "Critérios de aceitação atendidos"
          else
            echo "Critérios de aceitação não atendidos"
            exit 1
          fi
