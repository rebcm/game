name: Golden Tests Telas de Dicas

on:
  push:
    branches:
      - main

jobs:
  golden-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Golden Tests
        run: |
          flutter pub get
          flutter test test/golden_tests/telas_dicas_test.dart --update-goldens
