name: Telas Dicas Golden Test

on:
  push:
    branches:
      - main

jobs:
  golden-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
      - run: flutter pub get
      - run: flutter test test/golden_tests/telas_dicas_golden_test.dart --update-goldens
      - uses: actions/upload-artifact@v3
        with:
          name: goldens
          path: test/golden_tests/goldens
