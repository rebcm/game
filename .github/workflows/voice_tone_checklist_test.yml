name: Voice Tone Checklist Test

on:
  push:
    branches:
      - main

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Voice Tone Checklist
        run: |
          if ! grep -q "Checklist de Validação de Tom de Voz" ./docs/checklists/voice-tone-validation-checklist.md; then
            echo "Voice tone checklist not found or invalid"
            exit 1
          fi
