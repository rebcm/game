name: OpenAPI Contract Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run OpenAPI contract test
        run: |
          dart pub get
          dart test test/openapi_contract_test/openapi_contract_test.dart
