name: Volume Persistence Edge Cases Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'
      - run: flutter pub get
      - run: flutter test test/volume_test/volume_persistence_test.dart
