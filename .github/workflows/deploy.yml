name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run deploy strategy decision script
        run: |
          ./.github/workflows/scripts/deploy_strategy_decision.sh

      - name: Deploy with Wrangler CLI
        run: |
          wrangler deploy
