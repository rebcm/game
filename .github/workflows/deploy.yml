name: Deploy Construcao Criativa
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # web3d/ é HTML+JS+Three.js puro — sem build, é só copiar para o
      # Cloudflare Pages.
      - name: Deploy web3d to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web3d --project-name=construcao-criativa --commit-dirty=true
