name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Run smoke test
        run: |
          flutter drive --target=test/integration/smoke_test.dart --driver=test/integration/smoke_test_driver.dart

      - name: Check smoke test result
        run: |
          SMOKE_TEST_RESULT=$(cat smoke_test_result.json)
          if [ "$SMOKE_TEST_RESULT" != "200" ]; then
            echo "Smoke test failed with status $SMOKE_TEST_RESULT"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: build/web
