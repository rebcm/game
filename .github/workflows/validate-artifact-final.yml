name: Validate Artifact Final

on:
  workflow_dispatch:
  workflow_run:
    workflows: [release]
    types: [completed]

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: build-artifact
          path: build/

      - name: Validate binary
        run: |
          ./.github/workflows/scripts/validate_binary_version.sh build/
