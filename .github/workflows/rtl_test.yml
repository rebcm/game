name: RTL Test
on:
  push:
    branches:
      - main
jobs:
  rtl-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
      - name: Run RTL test
        run: |
          flutter test test/internacionalizacao/rtl_test.dart
