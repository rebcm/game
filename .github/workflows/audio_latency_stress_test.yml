name: Audio Latency Stress Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  test-audio-latency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run audio latency test
        run: |
          flutter test test/audio_latency_stress_test.dart
