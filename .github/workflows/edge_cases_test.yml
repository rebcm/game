name: Edge Cases Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run edge cases tests
        run: |
          flutter test test/widget_test/edge_cases/resolution_test.dart
          flutter test test/widget_test/edge_cases/input_test.dart
          flutter test test/widget_test/edge_cases/drift_test.dart
