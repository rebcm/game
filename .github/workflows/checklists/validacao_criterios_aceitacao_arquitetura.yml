name: Validação Critérios de Aceitação Arquitetura

on:
  push:
    branches:
      - main

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar separação de camadas
        run: |
          if grep -r 'import .*presentation.*' lib/data; then
            echo "Erro: Camada Data importando Presentation"
            exit 1
          fi
          if grep -r 'import .*data.*' lib/presentation; then
            echo "Erro: Camada Presentation importando Data"
            exit 1
          fi

      - name: Verificar dart analyze
        run: |
          dart analyze
