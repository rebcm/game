name: Validação Critérios de Aceitação Arquitetura

on:
  push:
    branches:
      - main

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar separação de camadas
        run: |
          if grep -r 'data/' lib/presentation; then
            echo "Erro: Arquivos de dados encontrados na camada de apresentação"
            exit 1
          fi
          if grep -r 'presentation/' lib/data; then
            echo "Erro: Arquivos de apresentação encontrados na camada de dados"
            exit 1
          fi
          if grep -r 'domain/' lib/data; then
            echo "Erro: Arquivos de domínio encontrados na camada de dados"
            exit 1
          fi

      - name: Verificar dependências
        run: |
          if grep -r 'flame:' lib/data; then
            echo "Erro: Dependência de apresentação encontrada na camada de dados"
            exit 1
          fi

      - name: Dart analyze
        run: dart analyze

      - name: Flutter test
        run: flutter test
