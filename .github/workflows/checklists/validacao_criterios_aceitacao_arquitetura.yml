name: Validação Critérios de Aceitação Arquitetura

on:
  push:
    branches:
      - main

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar separação de camadas
        run: |
          if grep -r 'data/' lib/domain; then
            echo "Erro: Arquivos de domínio importando camada de dados"
            exit 1
          fi
          if grep -r 'domain/' lib/data; then
            echo "Erro: Arquivos de dados importando camada de domínio"
            exit 1
          fi
          if grep -r 'data/' lib/presentation; then
            echo "Erro: Arquivos de apresentação importando camada de dados diretamente"
            exit 1
          fi

      - name: Verificar dart analyze
        run: |
          dart analyze
