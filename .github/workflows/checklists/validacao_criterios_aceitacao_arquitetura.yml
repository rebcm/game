name: Checklist de Aceitação da Arquitetura

on:
  pull_request:
    branches:
      - main

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar separação de camadas
        run: |
          if grep -r 'import .*presentation.*' lib/data; then
            echo "Erro: Camada Data importando Presentation"
            exit 1
          fi
          if grep -r 'import .*data.*' lib/domain; then
            echo "Erro: Camada Domain importando Data"
            exit 1
          fi

      - name: Verificar dart analyze
        run: |
          dart analyze lib
