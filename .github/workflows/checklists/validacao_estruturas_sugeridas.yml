name: Validação de Estruturas Sugeridas

on:
  push:
    branches:
      - main
    paths:
      - 'docs/estruturas_sugeridas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validar estruturas sugeridas
        run: .github/scripts/docs_validation/validate_estruturas_sugeridas.sh
