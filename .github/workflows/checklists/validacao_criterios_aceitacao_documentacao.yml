name: Validação Critérios de Aceitação Documentação

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run validation script
        run: .github/scripts/docs_validation/validate_documentation_criteria.sh
