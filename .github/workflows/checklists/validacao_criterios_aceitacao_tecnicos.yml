name: Validação Critérios Aceitação Técnicos

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run dart analyze
        run: dart analyze

      - name: Verify Constantes.autora
        run: |
          if ! grep -q "Rebeca Alves Moreira" lib/constantes.dart; then
            echo "Constantes.autora não contém 'Rebeca Alves Moreira'"
            exit 1
          fi
