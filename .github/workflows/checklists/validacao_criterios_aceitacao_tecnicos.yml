name: Validacao Critérios Aceitação Técnicos

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate SDK version
        run: |
          echo "Validating SDK version..."
          if [ "$(dart --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" != "$(grep 'sdk:' pubspec.yaml | cut -d '"' -f 2)" ]; then
            echo "SDK version mismatch"
            exit 1
          fi

      - name: Check for build warnings
        run: |
          echo "Checking for build warnings..."
          flutter build apk --release 2>&1 | tee build_log.txt
          if grep -q "warning" build_log.txt; then
            echo "Build warnings found"
            exit 1
          fi

      - name: Validate .apk/.ipa integrity
        run: |
          echo "Validating .apk/.ipa integrity..."
          # Add validation logic here
