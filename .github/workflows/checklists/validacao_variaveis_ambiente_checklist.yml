name: Validação de Variáveis de Ambiente

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-env-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar variáveis de ambiente
        run: |
          #!/bin/bash
          echo "Verificando variáveis de ambiente..."
          if [ -f .env ]; then
            echo ".env encontrado. Iniciando verificação..."
            while IFS= read -r line; do
              if [[ $line =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
                var_name=${line%%=*}
                var_name=${var_name%% }
                var_name=${var_name## }
                if ! grep -rq "$var_name" .; then
                  echo "Erro: Variável '$var_name' não encontrada no código."
                  exit 1
                fi
              fi
            done < .env
            echo "Variáveis de ambiente validadas com sucesso."
          else
            echo "Erro: Arquivo .env não encontrado."
            exit 1
          fi
