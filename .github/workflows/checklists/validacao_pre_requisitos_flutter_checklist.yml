name: Checklist de Pré-requisitos Flutter

on:
  workflow_dispatch:

jobs:
  validate_flutter_prerequisites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Flutter Version
        run: |
          echo "Validating Flutter version..."
          flutter --version

      - name: Validate Dart Version
        run: |
          echo "Validating Dart version..."
          dart --version

      - name: Validate System Dependencies
        run: |
          echo "Validating system dependencies..."
          # Add validation for system dependencies here

      - name: List Flutter SDK Version
        run: |
          echo "Flutter SDK version:"
          flutter --version | grep "Flutter"

      - name: List Dart SDK Version
        run: |
          echo "Dart SDK version:"
          dart --version

      - name: List System Dependencies
        run: |
          echo "System dependencies:"
          # List system dependencies required by the project

      - name: Output Checklist
        run: |
          echo "Checklist de Pré-requisitos Flutter:"
          echo "1. Flutter SDK: >=3.0.0"
          echo "2. Dart SDK: >=2.17.0 <3.0.0"
          echo "3. System dependencies: List of required dependencies"
