name: Checklist de Pré-requisitos Flutter

on:
  workflow_dispatch:

jobs:
  validate_flutter_prerequisites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Flutter Version
        run: |
          echo "Validating Flutter version..."
          flutter --version

      - name: Validate Dart Version
        run: |
          echo "Validating Dart version..."
          dart --version

      - name: List System Dependencies
        run: |
          echo "Listing system dependencies..."
          apt list --installed

      - name: Check Flutter Doctor
        run: |
          echo "Running Flutter Doctor..."
          flutter doctor

