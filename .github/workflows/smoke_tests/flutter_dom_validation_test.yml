name: Flutter DOM Validation Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --browser=web-server --web-port=8080 --no-headless

      - name: Validate DOM
        run: |
          curl -s http://localhost:8080/index.html | grep -q '<flt-glass-pane>'
