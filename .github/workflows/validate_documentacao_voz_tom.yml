name: Validate Documentação Voz Tom

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guidelines/voz_tom_checklist.md'

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Markdown
        run: |
          markdownlint docs/guidelines/voz_tom_checklist.md
