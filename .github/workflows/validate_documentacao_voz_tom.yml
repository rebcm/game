name: Validate Documentação Voz Tom

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guidelines/voz_tom_checklist.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Markdown
        run: |
          markdownlint docs/guidelines/voz_tom_checklist.md
