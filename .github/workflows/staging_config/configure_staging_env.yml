name: Configure Staging Environment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  configure-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Cloudflare R2
        run: |
          echo "${CLOUDFLARE_R2_ACCESS_KEY_ID}" > r2_access_key_id.txt
          echo "${CLOUDFLARE_R2_SECRET_ACCESS_KEY}" > r2_secret_access_key.txt
          aws configure set aws_access_key_id --file r2_access_key_id.txt
          aws configure set aws_secret_access_key --file r2_secret_access_key.txt
          aws configure set default.region auto

      - name: Create Staging Bucket
        run: |
          aws s3api create-bucket --bucket rebcm-staging --create-bucket-configuration LocationConstraint=auto

      - name: Configure Staging Bucket Policy
        run: |
          aws s3api put-bucket-policy --bucket rebcm-staging --policy '{"Version": "2012-10-17", "Statement": [{"Effect": "Allow", "Principal": "*", "Action": "s3:GetObject", "Resource": "arn:aws:s3:::rebcm-staging/*"}]}'

      - name: Output Staging Bucket Details
        run: |
          echo "Staging Bucket Name: rebcm-staging"
          echo "Staging Bucket Region: auto"
