name: Onboarding Test

on:
  push:
    branches:
      - main

jobs:
  onboarding-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run onboarding test
        run: |
          flutter drive --driver=test_driver/integration_test.dart --target=test/onboarding_test/onboarding_test.dart
