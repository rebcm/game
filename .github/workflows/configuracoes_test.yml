name: Testes de Configurações

on:
  push:
    branches:
      - main

jobs:
  test-configuracoes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'
      - run: flutter pub get
      - run: flutter test test/widget_test/configuracoes_test.dart
      - run: dart test lib/testes/configuracoes/ambiente_config_test.dart
