name: Testes de Configurações de Ambiente

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter test test/configuracoes/ambiente_test.dart
      - run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/configuracoes/ambiente_integration_test.dart
