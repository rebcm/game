    name: Validate Secrets
    
name: Loading Time Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test-loading-time:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Driver tests
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --profile
          LOADING_TIME=$(cat test_driver/loading_time.txt)
          echo "Loading time: $LOADING_TIME ms"
          if [ $LOADING_TIME -gt 3000 ]; then
            echo "Loading time exceeds 3 seconds"
            exit 1
          fi
