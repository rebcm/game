name: Build Matrix

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target-platform: [android, ios]
        build-mode: [debug, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build for ${{ matrix.target-platform }} in ${{ matrix.build-mode }} mode
        run: |
          if [ "${{ matrix.target-platform }}" == "android" ]; then
            flutter build apk --${{ matrix.build-mode }}
          elif [ "${{ matrix.target-platform }}" == "ios" ]; then
            flutter build ios --${{ matrix.build-mode }} --no-codesign
          fi

      - name: Archive artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.target-platform }}_${{ matrix.build-mode }}
          path: |
            build/app/outputs/flutter-apk/app-${{ matrix.build-mode }}.apk
            build/ios/iphoneos/${{ matrix.build-mode }}/Runner.app
