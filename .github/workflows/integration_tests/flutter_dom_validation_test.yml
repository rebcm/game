    name: Validate Secrets
    
name: Flutter DOM Validation Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=integration_test/app_test.dart --driver=integration_test/driver.dart --flavor=web
