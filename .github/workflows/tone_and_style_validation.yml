name: Tone and Style Validation

on:
  push:
    branches:
      - main

jobs:
  validate-tone-and-style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate tone and style
        run: |
          dart analyze .
          if [ $? -ne 0 ]; then
            echo "Dart analyze failed"
            exit 1
          fi
          bash .github/scripts/docs_validation/validate_tone_and_style.sh
