    name: Validate Secrets
    
name: Cloudflare Pages Smoke Test

on:
  workflow_dispatch:
  deployment_status:

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event.deployment_status.environment == 'github-pages'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify Cloudflare Pages deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://rebcm.pages.dev | grep -q "200" && echo "Smoke test passed" || (echo "Smoke test failed" && exit 1)
