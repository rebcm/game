name: Navegação Integração Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run integration test
        run: |
          flutter drive --target=test/integration_tests/navegacao_test/navegacao_test.dart --driver=test_driver/integration_test.dart
