    name: Validate Secrets
    
name: Token Validation Test

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Cloudflare token'
        required: true
      zone_id:
        description: 'Cloudflare zone ID'
        required: true

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
  validate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Cloudflare token
        env:
          TOKEN: ${{ github.event.inputs.token }}
          ZONE_ID: ${{ github.event.inputs.zone_id }}
        run: .github/scripts/validate_cloudflare_token.sh $TOKEN $ZONE_ID
