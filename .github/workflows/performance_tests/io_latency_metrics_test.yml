name: IO Latency Metrics Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --profile --trace-startup --cache

      - name: Generate Latency Metrics Report
        run: |
          # TO DO: implement report generation logic here
          echo "Generating report..."

      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: latency-metrics-report
          path: latency-metrics-report.txt
