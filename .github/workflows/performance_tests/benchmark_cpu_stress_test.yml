name: Benchmark CPU Stress Test

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to test on'
        required: true
        default: 'low-end-android'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Flutter Driver Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/performance_test.dart --profile --trace-systrace --cache-sksl

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark_results.json
