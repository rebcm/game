name: Benchmark CPU Stress Test

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to test on'
        required: true
        default: 'emulator-5554'

jobs:
  benchmark:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run benchmark test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/performance_test.dart --profile --trace-systrace --device=$INPUT_DEVICE
        env:
          INPUT_DEVICE: ${{ github.event.inputs.device }}
