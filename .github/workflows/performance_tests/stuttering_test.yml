name: Stuttering Test

on:
  push:
    branches:
      - main

jobs:
  stuttering-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Stuttering Test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/stuttering_test.dart --profile
