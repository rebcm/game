name: Smoke Test Pós-Deploy

on:
  workflow_dispatch:
  deployment_status:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configurar ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Executar smoke test
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          curl --fail --silent --show-error $DEPLOY_URL/index.html > /dev/null
          if [ $? -ne 0 ]; then
            echo "Smoke test falhou"
            exit 1
          fi
