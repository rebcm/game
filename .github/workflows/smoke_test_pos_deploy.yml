    name: Validate Secrets
    
name: Smoke Test Pós-Deploy

on:
  workflow_dispatch:
  deployment_status:

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configurar ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Executar smoke test
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          curl --fail --silent --show-error $DEPLOY_URL/index.html > /dev/null
          if [ $? -ne 0 ]; then
            echo "Smoke test falhou"
            exit 1
          fi
