name: Validacao Artefato Staging Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and validate artifact
        run: |
          flutter config --enable-web
          flutter build web --release
          flutter test integration_test/validacao_artefato_staging_test.dart

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-web
          path: build/web

