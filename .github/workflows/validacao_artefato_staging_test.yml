name: Validacao Artefato Staging Test

on:
  workflow_dispatch:

jobs:
  test-artefato-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Install dependencies
        run: flutter pub get

      - name: Build and test
        run: |
          flutter config --enable-web
          flutter build web --release
          flutter test integration_test/validacao_artefato_staging_test.dart

      - name: Deploy to staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: 'pages deploy ./build/web --project-name=rebcm-staging'

      - name: Validate artifact
        run: |
          # Implement validation logic here
          echo "Validating artifact..."
