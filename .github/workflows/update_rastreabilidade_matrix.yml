name: Update Rastreabilidade Matrix

on:
  push:
    branches:
      - main
    paths:
      - '.github/docs/rastreabilidade_ci_cd/rastreabilidade_matrix.md'

jobs:
  update-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify rastreabilidade matrix
        run: |
          echo "Verifying rastreabilidade matrix..."
          cat .github/docs/rastreabilidade_ci_cd/rastreabilidade_matrix.md

