name: Integration Test Flame Loop Flutter GL

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run integration test
        run: |
          flutter drive --target=integration_test/flame_loop_flutter_gl_integration_test.dart --driver=test_driver/integration_test.dart
