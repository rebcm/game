name: Flame Loop <-> flutter_gl Integration Test

on:
  push:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run integration test
        run: |
          flutter drive --target=test/integration_tests/flame_loop_flutter_gl_integration_test.dart --driver=test_driver/integration_test.dart
