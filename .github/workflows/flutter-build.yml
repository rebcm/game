name: Flutter Build

on:
  schedule:
    - cron:  '0 23 * * *'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter build web
