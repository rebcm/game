name: Flutter Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode Keystores
        env:
          KEY_JKS_BASE64: ${{ secrets.KEY_JKS_BASE64 }}
          KEY_P12_BASE64: ${{ secrets.KEY_P12_BASE64 }}
        run: .github/scripts/decode_keystores.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter
        run: flutter build apk --release

      - name: Build IPA
        run: flutter build ipa --release
