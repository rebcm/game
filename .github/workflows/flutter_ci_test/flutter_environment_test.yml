name: Flutter Environment Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run flutter doctor
        run: flutter doctor

      - name: Run flutter pub get
        run: flutter pub get

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: flutter test
