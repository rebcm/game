name: Animação Integração Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run integration test
        run: |
          flutter drive --target=test/integration_test/impacto_performance_test/fps_bateria_test.dart
