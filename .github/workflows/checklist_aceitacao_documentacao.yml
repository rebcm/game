name: Checklist de Aceitação para Documentação

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guias_construcao/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validar checklist de aceitação para documentação
        run: ./.github/scripts/docs_validation/checklist_aceitacao_documentacao/validate_checklist_documentacao.sh
