name: Stuttering KPI Definition

on:
  workflow_dispatch:
    inputs:
      fps_threshold:
        description: 'FPS Threshold'
        required: true
        default: '55'
      jank_frames_threshold:
        description: 'Jank Frames Threshold'
        required: true
        default: '10'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  define_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define Stuttering KPI
        run: |
          echo "FPS Threshold: ${{ github.event.inputs.fps_threshold }}"
          echo "Jank Frames Threshold: ${{ github.event.inputs.jank_frames_threshold }}"
