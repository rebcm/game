name: Retenção Script Integração Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/retencao_script_integracao_test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration test
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/retencao_script_test.dart
