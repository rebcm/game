name: Movimentação Stress Test

on:
  schedule:
    - cron: '0 23 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'
      - run: flutter pub get
      - run: flutter test test/stress/movimentacao_stress_test.dart
