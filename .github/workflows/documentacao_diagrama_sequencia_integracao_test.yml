name: Testar Diagrama de Sequência de Integração

on:
  push:
    branches:
      - main
    paths:
      - docs/diagramas/sequencia-integracao.puml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install PlantUML
        run: sudo apt-get install -y plantuml

      - name: Generate diagram
        run: plantuml docs/diagramas/sequencia-integracao.puml -o assets/docs/diagramas/

      - name: Verify diagram generation
        run: |
          if [ -f assets/docs/diagramas/sequencia-integracao.png ]; then
            echo "Diagram generated successfully"
          else
            echo "Failed to generate diagram"
            exit 1
          fi
