    name: Validate Secrets
    
name: Testar Diagrama de Sequência de Integração

on:
  push:
    branches:
      - main
    paths:
      - 'docs/diagramas/sequencia/**'

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validar Diagrama
        run: |
          sudo apt-get install -y plantuml
          plantuml docs/diagramas/sequencia/integracao-flutter-cloudflare.puml -o docs/diagramas/sequencia/output
