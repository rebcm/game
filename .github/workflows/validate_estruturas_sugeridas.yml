name: Validate Estruturas Sugeridas

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate estruturas sugeridas
        run: ./.github/scripts/docs_validation/estruturas_sugeridas/validate_estruturas_sugeridas.sh
