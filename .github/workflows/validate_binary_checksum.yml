name: Validate Binary Checksum

on:
  push:
    branches:
      - main

jobs:
  validate-checksum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Build APK
        run: flutter build apk

      - name: Calculate Checksum
        run: sha256sum build/app/outputs/flutter-apk/app-release.apk > checksum.txt

      - name: Compare Checksum with Previous Version
        run: |
          curl -o previous_checksum.txt https://raw.githubusercontent.com/rebcm/game/main/checksum.txt || echo "Previous checksum file not found"
          diff checksum.txt previous_checksum.txt || (echo "Checksum mismatch" && exit 1)

      - name: Store Checksum
        run: |
          mv checksum.txt .
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add checksum.txt
          git commit -m "Update checksum.txt" || echo "No changes to commit"
