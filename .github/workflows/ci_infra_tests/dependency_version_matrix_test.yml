    name: Validate Secrets
    
name: Dependency Version Matrix Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate dependency versions
        run: |
          echo "Validating Flutter SDK version..."
          flutter --version

          echo "Validating Dart version..."
          dart --version

          echo "Validating Java version..."
          java -version
