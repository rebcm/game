name: Dependency Fetch Validation Test

on:
  push:
    branches:
      - main

jobs:
  validate_dependency_fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Validate dependency fetch
        run: ./scripts/validate_dependency_fetch.sh
