name: Secrets Expiration Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check secrets expiration
        run: |
          # Check if GitHub secrets are expired
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GitHub token is empty or expired"
            exit 1
          fi
