name: Flutter e Dart Version Matrix Test

on:
  push:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Verificar versão do Flutter e Dart
        run: |
          flutter --version
          dart --version
          echo "Versão do Flutter: $(flutter --version | grep 'Flutter' | awk '{print $2}')"
          echo "Versão do Dart: $(dart --version | grep 'Dart' | awk '{print $4}' | tr -d ',')"

      - name: Validar versão do Flutter e Dart
        run: |
          FLUTTER_VERSION=$(flutter --version | grep 'Flutter' | awk '{print $2}')
          DART_VERSION=$(dart --version | grep 'Dart' | awk '{print $4}' | tr -d ',')
          echo "FLUTTER_VERSION: $FLUTTER_VERSION"
          echo "DART_VERSION: $DART_VERSION"
          if [[ "$FLUTTER_VERSION" != "3.0.0" || "$DART_VERSION" != "2.17.0" ]]; then
            echo "Versão do Flutter ou Dart não corresponde à esperada."
            exit 1
          fi
