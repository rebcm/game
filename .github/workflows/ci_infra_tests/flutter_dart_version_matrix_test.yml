name: Flutter and Dart Version Matrix Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Validate Flutter and Dart versions
        run: |
          flutter --version
          dart --version
          echo "Checking Flutter version..."
          FLUTTER_VERSION=$(flutter --version | grep "Flutter" | awk '{print $2}')
          if [ "$FLUTTER_VERSION" != "3.0.0" ]; then
            echo "Flutter version mismatch: expected 3.0.0, got $FLUTTER_VERSION"
            exit 1
          fi
          echo "Checking Dart version..."
          DART_VERSION=$(dart --version | grep "Dart" | awk '{print $4}' | tr -d ',')
          if [ "$(printf '%s\n' "2.17.0" "$DART_VERSION" | sort -V | head -n1)" != "2.17.0" ]; then
            echo "Dart version mismatch: expected >= 2.17.0, got $DART_VERSION"
            exit 1
          fi
          if [ "$(printf '%s\n' "$DART_VERSION" "3.0.0" | sort -V | tail -n1)" != "3.0.0" ]; then
            echo "Dart version mismatch: expected < 3.0.0, got $DART_VERSION"
            exit 1
          fi
