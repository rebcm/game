name: Network Failure Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate network failure
        run: |
          # Simulate network failure by blocking the dependency download
          sudo iptables -A OUTPUT -p tcp --dport 443 -j DROP

      - name: Run flutter pub get with network failure
        run: |
          # Try to run flutter pub get with the network blocked
          if ! flutter pub get; then
            echo "Flutter pub get failed due to network failure"
          else
            echo "Flutter pub get succeeded unexpectedly"
            exit 1
          fi

      - name: Restore network connection
        run: |
          # Restore the network connection
          sudo iptables -D OUTPUT -p tcp --dport 443 -j DROP

      - name: Check secrets expiration
        run: |
          # Check if GitHub secrets are expired
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GitHub token is empty or expired"
            exit 1
          fi

      - name: Test Ruby/Fastlane version conflicts
        run: |
          # Test for Ruby/Fastlane version conflicts
          if ! bundle install; then
            echo "Ruby/Fastlane version conflict detected"
            exit 1
          fi
