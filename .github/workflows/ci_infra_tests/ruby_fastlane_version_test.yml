name: Ruby Fastlane Version Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Test Ruby/Fastlane version conflicts
        run: |
          # Test for Ruby/Fastlane version conflicts
          if ! bundle install; then
            echo "Ruby/Fastlane version conflict detected"
            exit 1
          fi
