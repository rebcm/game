name: Flutter and Dart Version Check

on:
  push:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check Flutter version
        run: |
          echo "Checking Flutter version..."
          flutter --version

      - name: Check Dart version
        run: |
          echo "Checking Dart version..."
          dart --version

      - name: Validate Flutter version
        run: |
          echo "Validating Flutter version..."
          FLUTTER_VERSION=$(flutter --version | grep "Flutter" | awk '{print $2}')
          echo "Flutter version: $FLUTTER_VERSION"
          if [[ ! "$FLUTTER_VERSION" =~ ^3\.0\. ]]; then
            echo "Flutter version mismatch"
            exit 1
          fi

      - name: Validate Dart version
        run: |
          echo "Validating Dart version..."
          DART_VERSION=$(dart --version | grep "Dart" | awk '{print $4}' | tr -d ',')
          echo "Dart version: $DART_VERSION"
          if [[ ! "$DART_VERSION" =~ ^2\.17\. ]]; then
            echo "Dart version mismatch"
            exit 1
          fi
