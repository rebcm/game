name: Flutter Dart SDK Baseline Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Run Flutter Doctor
        run: flutter doctor

      - name: Test Flutter Version
        run: |
          flutter --version | grep "Flutter 3.0.0" && echo "Flutter version is correct" || (echo "Flutter version is incorrect" && exit 1)

      - name: Test Dart Version
        run: |
          dart --version | grep "Dart SDK version: 2.17." && echo "Dart version is correct" || (echo "Dart version is incorrect" && exit 1)
