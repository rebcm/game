name: Flutter Dart SDK Baseline Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Run Flutter Doctor
        run: flutter doctor

      - name: Analyze Dart Code
        run: dart analyze

      - name: Test Flutter Dart SDK Baseline
        run: flutter test
