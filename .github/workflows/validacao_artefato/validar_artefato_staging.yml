name: Validar Artefato Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types:
      - completed

jobs:
  validar-artefato-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: build-output
          path: build/web

      - name: Validate artifact
        run: |
          flutter config --enable-web
          flutter doctor
          flutter test integration_test/validar_artefato_staging_test.dart
