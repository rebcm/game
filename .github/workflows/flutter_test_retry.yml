name: Flutter Test with Retry

on:
  push:
    branches:
      - main

jobs:
  test-with-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with retry
        run: |
          flutter test --dart-define=RETRY_COUNT=3
