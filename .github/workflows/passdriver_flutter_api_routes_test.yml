name: Passdriver Flutter API Routes Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'

      - name: Run tests
        run: |
          flutter test test/passdriver_flutter_api_routes/permission_validation_test.dart
