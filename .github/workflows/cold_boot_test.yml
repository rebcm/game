name: Cold Boot Test

on:
  push:
    branches:
      - main

jobs:
  cold-boot-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run cold boot script
        run: .github/scripts/cold_boot.sh

      - name: Run integration tests
        run: flutter drive --target=test_driver/app.dart
