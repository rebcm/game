name: Validate Artifact

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  validate-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact
          path: artifacts/

      - name: Validate checksum
        run: |
          .github/workflows/scripts/validate_checksum.sh artifacts/

      - name: Validate binary version
        run: |
          .github/workflows/scripts/validate_binary_version.sh artifacts/
