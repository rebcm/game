name: Validate Artifact Signature

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  validate-signature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download APK artifact
        uses: actions/download-artifact@v3
        with:
          name: app-release.apk

      - name: Validate APK signature
        run: .github/workflows/scripts/validate_signature.sh app-release.apk
