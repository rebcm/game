name: Validate Artifact Signature

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  validate-signature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk
          path: ./app-release.apk

      - name: Validate APK signature
        run: ./.github/workflows/scripts/validate_signature.sh ./app-release.apk
