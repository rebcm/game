name: Artefato Limpeza Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'
      - name: Run integration test
        run: |
          flutter drive --target=test/integration_tests/artefato_limpeza_test/artefato_limpeza_test.dart --driver=test_driver/integration_test.dart
