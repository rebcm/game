name: Memory Profiling Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  memory-profiling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run Memory Profiling Test
        run: |
          flutter pub get
          flutter drive --target=test_driver/app.dart --driver=test_driver/memory_profiling_test.dart --profile
