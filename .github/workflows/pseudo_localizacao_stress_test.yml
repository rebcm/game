name: Pseudo Localização Stress Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run pseudo-localização stress test
        run: |
          flutter test test/widget_test/pseudo_localizacao_test/main_screen_pseudo_localizacao_test.dart
