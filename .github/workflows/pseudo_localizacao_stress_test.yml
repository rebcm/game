name: Pseudo Localização Stress Test

on:
  push:
    branches:
      - main

jobs:
  pseudo-localizacao-stress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'

      - name: Run pseudo-localização stress test
        run: |
          flutter test test/widget_test/pseudo_localizacao_test/pseudo_localizacao_test.dart
