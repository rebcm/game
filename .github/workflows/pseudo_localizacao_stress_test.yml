name: Pseudo Localização Stress Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 12 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'
      - run: flutter pub get
      - run: flutter test test/widget_test/pseudo_localizacao_test.dart
