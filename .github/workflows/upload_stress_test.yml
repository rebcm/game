name: Upload Stress Test

on:
  schedule:
    - cron:  '0 20 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run upload stress test
        run: |
          flutter test integration_test/sincronizacao/upload_stress_test.dart
