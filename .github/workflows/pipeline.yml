    name: Validate Secrets
    
name: Pipeline de CI/CD
on:
  schedule:
    - cron: '0 23 * * *'
      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: |
          flutter pub get
      - name: Build and deploy
        run: |
          flutter build apk
          ./deploy.sh
