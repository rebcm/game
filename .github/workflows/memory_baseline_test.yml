name: Memory Baseline Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  memory_baseline_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run memory baseline test
        run: |
          flutter pub get
          flutter drive --driver=test_driver/integration_test.dart --target=integration_test/memory_baseline_test.dart

      - name: Upload memory baseline results
        uses: actions/upload-artifact@v3
        with:
          name: memory-baseline-results
          path: memory_baseline_results.json
