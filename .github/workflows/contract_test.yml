name: Contract Test

on:
  push:
    branches:
      - main

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run contract tests
        run: |
          flutter pub get
          flutter test test/contract_tests/openapi_contract_test.dart
