name: Codec Compatibility Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run codec compatibility test
        run: flutter test test/codec_compatibility/codec_compatibility_test.dart
