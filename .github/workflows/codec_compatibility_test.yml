name: Codec Compatibility Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run codec compatibility test
        run: |
          flutter drive --driver=test_driver/integration_test.dart --target=integration_test/codec_compatibility_test/codec_compatibility_test.dart
