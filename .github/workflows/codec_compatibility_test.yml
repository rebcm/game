name: Codec Compatibility Test

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 2 * * *'

jobs:
  test-codecs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run Codec Compatibility Test
        run: |
          flutter pub get
          flutter test test/codec_compatibility_test.dart
