name: Dependency Map

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  dependency-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'
          channel: 'stable'

      - name: Generate Dependency Map
        run: |
          echo "Flutter SDK: $(flutter --version)" > dependency_map.txt
          echo "Dart SDK: $(dart --version)" >> dependency_map.txt
          echo "Pubspec Dependencies:" >> dependency_map.txt
          cat pubspec.yaml | grep '^  [a-zA-Z0-9_]' | sed 's/^[[:space:]]*//g' >> dependency_map.txt

      - name: Upload Dependency Map
        uses: actions/upload-artifact@v3
        with:
          name: dependency_map.txt
          path: dependency_map.txt
