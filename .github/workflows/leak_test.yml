name: Leak Test

on:
  push:
    branches:
      - main

jobs:
  leak-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run leak test
        run: |
          flutter test test/leak_test/leak_test.dart
