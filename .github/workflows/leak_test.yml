name: Leak Test

on:
  push:
    branches:
      - main

jobs:
  leak-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
      - run: flutter pub get
      - run: flutter test test/leak_tests/leak_test.dart
