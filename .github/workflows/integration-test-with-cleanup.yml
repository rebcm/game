name: Integration Test with Cleanup

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run integration test
        run: |
          flutter drive --target=integration_test/app_test.dart

      - name: Cleanup
        run: |
          .github/workflows/scripts/cleanup_integration_test.sh
