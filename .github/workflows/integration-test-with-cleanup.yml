name: Integration Test with Cleanup

on:
  push:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run integration test with cleanup
        run: |
          flutter drive --target=test/integration_tests/cleanup_test.dart --driver=test_driver/integration_test.dart
