name: Integration Test with Cleanup

on:
  push:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run integration test with cleanup
        run: |
          flutter drive --driver=test/integration_tests/cleanup_test.dart --target=integration_test/app.dart
