name: Chunk Render Stress Test

on:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run stress test
        run: |
          flutter test test/stress_tests/chunk_render_stress_test.dart
