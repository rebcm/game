name: Chunk Render Stress Test

on:
  workflow_dispatch:

jobs:
  stress-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.1'

      - name: Install dependencies
        run: flutter pub get

      - name: Run stress test
        run: |
          flutter drive --target=test_driver/stress_test/main.dart --driver=test_driver/stress_test/stress_test.dart
