name: Coverage Pipeline

on:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.10'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: |
          flutter test --coverage

      - name: Verify coverage threshold
        run: |
          coverage_threshold=$(cat coverage/lcov.info | grep -o '^SF:.*' | wc -l)
          min_threshold=50
          if [ $coverage_threshold -lt $min_threshold ]; then
            echo "Coverage threshold not met. Expected at least $min_threshold, got $coverage_threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
