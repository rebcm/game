    name: Validate Secrets
    
name: Compression Test

on:
  workflow_dispatch:

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  compression-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download KPI artifact
        uses: actions/download-artifact@v3
        with:
          name: compression-kpi

      - name: Run Flutter build
        run: |
          flutter build apk

      - name: Validate compression KPI
        run: |
          ./scripts/validate_compression_kpi.sh
