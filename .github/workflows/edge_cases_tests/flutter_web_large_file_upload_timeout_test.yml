name: Flutter Web Large File Upload Timeout Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run test
        run: |
          # Simulate large file upload timeout
          export UPLOAD_TIMEOUT=1
          flutter test test/flutter_web_large_file_upload_timeout_test.dart
