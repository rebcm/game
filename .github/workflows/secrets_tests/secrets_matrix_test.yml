name: Secrets Matrix Test

on:
  workflow_dispatch:

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Test all secrets missing
        env:
          ALL_SECRETS: ${{ secrets.ALL_SECRETS }}
        run: |
          if [ -z "$ALL_SECRETS" ]; then
            echo "All secrets are missing as expected"
          else
            exit 1
          fi

      - name: Test secrets partially missing
        env:
          SOME_SECRET: ${{ secrets.SOME_SECRET }}
        run: |
          if [ -n "$SOME_SECRET" ] && [ -z "${{ secrets.OTHER_SECRET }}" ]; then
            echo "Secrets are partially missing as expected"
          else
            exit 1
          fi

      - name: Test all secrets present
        env:
          ALL_SECRETS_PRESENT: ${{ secrets.ALL_SECRETS_PRESENT }}
        run: |
          if [ -n "$ALL_SECRETS_PRESENT" ]; then
            echo "All secrets are present as expected"
          else
            exit 1
          fi
