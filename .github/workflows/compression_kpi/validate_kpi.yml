name: Validate Compression KPI

on:
  workflow_dispatch:
    inputs:
      original-size:
        description: 'Original APK/IPA size'
        required: true
        type: string
      new-size:
        description: 'New APK/IPA size after conversion'
        required: true
        type: string

jobs:
  validate-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate KPI
        run: |
          original_size=$(echo "${{ github.event.inputs.original-size }}" | numfmt --from=iec)
          new_size=$(echo "${{ github.event.inputs.new-size }}" | numfmt --from=iec)
          reduction=$(echo "scale=2; (($original_size - $new_size) / $original_size) * 100" | bc)

          echo "Original size: $original_size bytes"
          echo "New size: $new_size bytes"
          echo "Reduction: $reduction%"

          target_reduction=$(cat compression_target.txt)
          if (( $(echo "$reduction >= $target_reduction" | bc -l) )); then
            echo "KPI achieved: $reduction% >= $target_reduction%"
          else
            echo "KPI not achieved: $reduction% < $target_reduction%"
            exit 1
          fi
