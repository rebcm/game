name: Validate Compression KPI

on:
  workflow_dispatch:

jobs:
  validate-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate KPI
        run: |
          target_reduction=$(cat compression_target.txt)
          current_size=$(stat -c%s rebcm.apk)
          new_size=$(stat -c%s rebcm_new.apk)
          reduction=$(echo "scale=2; (($current_size - $new_size) / $current_size) * 100" | bc)
          if (( $(echo "$reduction >= $target_reduction" | bc -l) )); then
            echo "KPI achieved: $reduction% reduction"
          else
            echo "KPI not achieved: $reduction% reduction"
            exit 1
          fi
