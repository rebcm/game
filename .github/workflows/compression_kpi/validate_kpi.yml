name: Validate Compression KPI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/**'
      - 'pubspec.yaml'

jobs:
  validate-compression-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Measure APK size
        run: |
          APK_SIZE=$(stat -c%s "build/app/outputs/flutter-apk/app-release.apk")
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV

      - name: Validate KPI
        run: |
          if [ $APK_SIZE -le 30000000 ]; then
            echo "KPI achieved: APK size is $APK_SIZE bytes"
          else
            echo "KPI not achieved: APK size is $APK_SIZE bytes"
            exit 1
          fi
