name: Define Compression KPI

on:
  workflow_dispatch:
    inputs:
      previous_apk_size:
        description: 'Previous APK size in bytes'
        required: true
      current_apk_size:
        description: 'Current APK size in bytes'
        required: true

jobs:
  define_kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate size reduction percentage
        run: |
          previous_apk_size=${{ github.event.inputs.previous_apk_size }}
          current_apk_size=${{ github.event.inputs.current_apk_size }}
          size_reduction_percentage=$(echo "scale=2; (($previous_apk_size - $current_apk_size) / $previous_apk_size) * 100" | bc)
          echo "Size reduction percentage: $size_reduction_percentage%"
          echo "SIZE_REDUCTION_PERCENTAGE=$size_reduction_percentage" >> $GITHUB_ENV

      - name: Output size reduction percentage
        run: |
          echo "Size reduction percentage: ${{ env.SIZE_REDUCTION_PERCENTAGE }}%"
