    name: Validate Secrets
    
name: Define Compression KPI

on:
  workflow_dispatch:
    inputs:
      payload-size:
        description: 'Payload size in bytes'
        required: true

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  define-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Calculate compression ratio
        run: |
          original_size=${{ github.event.inputs.payload-size }}
          compressed_size=$(gzip -c payload.dat | wc -c)
          compression_ratio=$(echo "scale=2; ($original_size - $compressed_size) / $original_size * 100" | bc)
          echo "Compression ratio: $compression_ratio%"
          echo "COMPRESSION_RATIO=$compression_ratio" >> $GITHUB_ENV

      - name: Store KPI
        run: |
          echo "Compression KPI: $COMPRESSION_RATIO%"
          echo "$COMPRESSION_RATIO" > compression_kpi.txt
