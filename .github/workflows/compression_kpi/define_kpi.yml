name: Define Compression KPI

on:
  workflow_dispatch:
    inputs:
      target-size:
        description: 'Target size in bytes'
        required: true

jobs:
  define-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define KPI
        run: |
          echo "target_size=${{ github.event.inputs.target-size }}" > compression_kpi.txt

      - name: Upload KPI artifact
        uses: actions/upload-artifact@v3
        with:
          name: compression-kpi
          path: compression_kpi.txt
