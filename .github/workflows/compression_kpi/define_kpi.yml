name: Define Compression KPI

on:
  workflow_dispatch:
    inputs:
      target-reduction:
        description: 'Target reduction percentage'
        required: true
        type: string

jobs:
  define-kpi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Define KPI
        run: |
          echo "Target reduction: ${{ github.event.inputs.target-reduction }}%"
          echo "${{ github.event.inputs.target-reduction }}" > compression_target.txt
