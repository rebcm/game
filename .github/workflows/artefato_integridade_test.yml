name: Artefato Integridade Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/blocos/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Testar integridade do artefato
        run: |
          flutter test integration_test/artefato_integridade_test.dart
