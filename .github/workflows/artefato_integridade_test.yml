name: Testes de Integridade de Artefato

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check Flutter version
        run: flutter --version
        with:
          flutter-version: '3.0.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/artefato_integridade_test.dart

      - name: Upload test logs
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: test-logs.log
