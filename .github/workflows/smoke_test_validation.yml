name: Smoke Test Validation

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  validate-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Smoke Test
        run: |
          response=$(curl -s -o response.html -w "%{http_code}" https://example.com)
          if [ "$response" != "200" ]; then
            echo "Failed to retrieve page"
            exit 1
          fi
          if ! grep -q 'passdriver' response.html; then
            echo "Smoke test validation failed"
            exit 1
          fi
