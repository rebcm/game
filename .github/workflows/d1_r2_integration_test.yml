name: D1 R2 Integration Test

on:
  push:
    branches:
      - main

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run integration test
        run: |
          flutter drive --driver=test/integration_tests/d1_r2_integration_test.dart --target=lib/main.dart
