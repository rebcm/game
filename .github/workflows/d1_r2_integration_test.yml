name: D1/R2 Integration Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run integration test
        run: |
          flutter drive --target=test/integration_tests/d1_r2_integration_test.dart --driver=test_driver/integration_test.dart
