name: Deploy Validation

on:
  workflow_dispatch:
    inputs:
      cloudflare_token:
        description: 'Cloudflare Token'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Cloudflare Token
        run: |
          ./scripts/validate_cloudflare_token.sh ${{ github.event.inputs.cloudflare_token }}
