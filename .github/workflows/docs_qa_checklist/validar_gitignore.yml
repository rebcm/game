    name: Validate Secrets
    
name: Validar .gitignore

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  validar-gitignore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar .gitignore
        run: |
          if git check-ignore .dev.vars; then
            echo ".dev.vars está sendo ignorado pelo .gitignore"
          else
            echo ".dev.vars NÃO está sendo ignorado pelo .gitignore"
            exit 1
          fi
