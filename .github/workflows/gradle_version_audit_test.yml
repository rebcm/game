name: Gradle Version Audit Test

on:
  push:
    branches:
      - main

      validate-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Validate Secrets
            run: .github/scripts/validate_secrets.sh
        continue-on-error: false
jobs:
  audit-gradle-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper version
        run: |
          expected_url="https://services.gradle.org/distributions/gradle-8.7-bin.zip"
          actual_url=$(cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl | cut -d '=' -f2-)
          if [ "$actual_url" != "$expected_url" ]; then
            echo "Gradle Wrapper version mismatch: expected $expected_url, got $actual_url"
            exit 1
          fi
