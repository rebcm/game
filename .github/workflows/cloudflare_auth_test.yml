name: Cloudflare Auth Test

on:
  workflow_dispatch:

jobs:
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  test-cloudflare-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk-version: '>=2.12.0 <3.0.0'

      - name: Install dependencies
        run: dart pub get

      - name: Run Cloudflare Auth Test
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: dart test/test_cloudflare_auth.dart
