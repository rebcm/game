name: Persistência Crash Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run test
        run: |
          flutter drive --target=test_driver/persistencia_crash_test.dart --driver=test_driver/persistencia_crash_test.dart
