name: Persistência Crash Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.1'

      - name: Run Persistência Crash Test
        run: |
          flutter drive --driver=test_driver/persistencia_crash_test.dart --target=integration_test/persistencia_crash_test.dart
