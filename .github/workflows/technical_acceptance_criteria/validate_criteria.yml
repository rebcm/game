name: Validar Critérios de Aceitação Técnica

on:
  push:
    branches:
      - main

jobs:
  validar-criterios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executar dart analyze
        run: |
          dart analyze

      - name: Validar versão do SDK
        run: |
          echo "Validando versão do SDK"
          if grep -q "sdk: \">=2.12.0 <3.0.0\"" pubspec.yaml; then
            echo "Versão do SDK válida"
          else
            echo "Versão do SDK inválida"
            exit 1
          fi

      - name: Verificar integridade do arquivo .ipa/.apk
        run: |
          echo "Verificando integridade do arquivo .ipa/.apk"
