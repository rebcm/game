name: Visualization Edge Cases Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
      - run: flutter pub get
      - run: flutter test test/widget_test/edge_cases/visualization_edge_cases_test.dart
      - uses: actions/upload-artifact@v3
        with:
          name: visualization-edge-cases-test-results
          path: test/widget_test/edge_cases/visualization_edge_cases_test.dart.goldens/
