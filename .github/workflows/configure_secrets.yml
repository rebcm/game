name: Configure Secrets

on:
  workflow_dispatch:

jobs:
  configure-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure CF_API_TOKEN and CF_ACCOUNT_ID
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "CF_API_TOKEN is $CF_API_TOKEN"
          echo "CF_ACCOUNT_ID is $CF_ACCOUNT_ID"
