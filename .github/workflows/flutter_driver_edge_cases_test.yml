name: Flutter Driver Edge Cases Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.5'

      - name: Run Flutter Driver Tests with Edge Cases
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/app_test.dart --timeout=300s --retries=3
