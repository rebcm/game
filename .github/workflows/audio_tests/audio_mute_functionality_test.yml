name: Audio Mute Functionality Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run audio mute test
        run: |
          flutter drive --target=test/audio_tests/audio_mute_test.dart --driver=test_driver/integration_test.dart
