name: Audio Volume Slider Integration Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run integration test
        run: |
          flutter drive --driver=test/integration_tests/audio_integration_test/audio_volume_slider_test.dart --target=test/integration_tests/audio_integration_test/main.dart
