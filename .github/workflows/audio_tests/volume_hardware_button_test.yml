name: Volume Hardware Button Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run test
        run: |
          flutter drive --driver=test/integration_tests/audio_tests/volume_hardware_button_test.dart --target=test/integration_tests/audio_tests/volume_hardware_button_test.dart
