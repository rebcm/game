name: Audio Concurrency Stress Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run audio concurrency stress test
        run: |
          flutter drive --target=test_driver/app.dart --driver=test_driver/audio_concurrency_stress_test.dart

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test_driver/test_results/
