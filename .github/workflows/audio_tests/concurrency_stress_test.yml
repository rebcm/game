name: Concurrency Stress Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run concurrency stress test
        run: |
          flutter test test/integration_test/audio_stress_test/audio_concurrency_stress_test.dart
