name: Audio Concurrency Stress Test

on:
  push:
    branches:
      - main

jobs:
  concurrency_stress_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'

      - name: Run concurrency stress test
        run: |
          flutter test test/stress_tests/audio_concurrency_stress_test.dart
