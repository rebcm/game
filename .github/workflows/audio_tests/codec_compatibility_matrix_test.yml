name: Codec Compatibility Matrix Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [android, ios]
        codec: [ogg, mp3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
      - name: Run tests
        run: |
          flutter drive --target=test/audio/audio_codec_test.dart --driver=test_driver/integration_test.dart
