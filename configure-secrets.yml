name: Configure Secrets

on:
  workflow_dispatch:

jobs:
  configure-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate Secrets Configuration
        run: |
          echo "Validating secrets configuration..."
          if [ -f ".env" ]; then
            echo ".env file exists. Checking for required secrets..."
            if grep -q "SECRET_KEY" .env; then
              echo "SECRET_KEY is present in .env"
            else
              echo "SECRET_KEY is missing in .env. Please configure it."
              exit 1
            fi
          else
            echo ".env file does not exist. Please create it and configure the required secrets."
            exit 1
          fi
