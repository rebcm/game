extends:
  default: &default
    stages:
      - build
      - deploy
    variables:
      ANDROID_SDK_VERSION: '33'
      ANDROID_BUILD_TOOLS_VERSION: '33.0.0'
      ANDROID_GRADLE_VERSION: '7.5.1'
    before_script:
      - echo 'Configurando o ambiente Android...'
    build:
      stage: build
      script:
        - echo 'Construindo o APK...'
        - ./gradlew assembleDebug
      artifacts:
        paths:
          - app/build/outputs/apk/debug/app-debug.apk
    deploy:
      stage: deploy
      script:
        - echo 'Enviando o APK para o servidor...'

