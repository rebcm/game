openapi: 3.0.0
info:
  title: API de Blocos
  description: API para manipulação de blocos
  version: 1.0.0

paths:
  /blocos:
    get:
      summary: Listar blocos
      responses:
        '200':
          description: Lista de blocos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bloco'
      tags:
        - Blocos

    post:
      summary: Criar um novo bloco
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bloco'
      responses:
        '201':
          description: Bloco criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bloco'
      tags:
        - Blocos

  /blocos/{id}:
    get:
      summary: Obter um bloco por ID
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID do bloco
      responses:
        '200':
          description: Bloco encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bloco'
        '404':
          description: Bloco não encontrado
      tags:
        - Blocos

components:
  schemas:
    Bloco:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
      required:
        - id
        - nome
