openapi: 3.0.0
info:
  title: Game API
  version: 1.0.0
paths:
  /blocks:
    get:
      summary: Get all blocks
      responses:
        '200':
          description: A list of blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Block'
              example:
                - id: 1
                  name: Block 1
                - id: 2
                  name: Block 2
components:
  schemas:
    Block:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
