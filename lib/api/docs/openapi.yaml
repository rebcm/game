openapi: 3.0.0
info:
  title: Rebeca Game API
  description: API documentation for Rebeca Game
  version: 1.0.0
paths:
  /blocks:
    get:
      summary: Retrieve a list of available blocks
      responses:
        '200':
          description: A list of blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Block'
components:
  schemas:
    Block:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
