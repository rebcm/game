[env]
  [env.staging]
    name = "construcao-criativa-staging"
    workers_dev = true
    route = ""
    zone_id = ""
    vars = { ENVIRONMENT = "staging" }
    kv_namespaces = [
      { binding = "KV_MUNDOS", id = "" },
    ]

  [env.production]
    name = "construcao-criativa-production"
    workers_dev = false
    route = "*construcao-criativa.workers.dev/*"
    zone_id = ""
    vars = { ENVIRONMENT = "production" }
    kv_namespaces = [
      { binding = "KV_MUNDOS", id = "" },
    ]
