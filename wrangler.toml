[env.staging]
name = "construcao-criativa-staging"
route = "construcao-criativa-staging.workers.dev/*"

[env.production]
name = "construcao-criativa-production"
route = "construcao-criativa.workers.dev/*"

[vars]
BUCKET_NAME_STAGING = "rebcm-staging"
BUCKET_NAME_PRODUCTION = "rebcm-production"

[env.staging.vars]
BUCKET_NAME = "rebcm-staging"

[env.production.vars]
BUCKET_NAME = "rebcm-production"
