# Configuração do Wrangler para Cloudflare Workers
name = "construcao-criativa"
main = "worker.js"
compatibility_date = "2023-01-01"

[env.staging]
vars = {
  API_TOKEN = { binding = "API_TOKEN", type = "secret" }
}

[env.production]
vars = {
  API_TOKEN = { binding = "API_TOKEN", type = "secret" }
}

[vars]
CLOUDFLARE_API_TOKEN = "${CLOUDFLARE_API_TOKEN}"
CLOUDFLARE_ACCOUNT_ID = "${CLOUDFLARE_ACCOUNT_ID}"
