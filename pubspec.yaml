name: game
description: Construção Criativa da Rebeca - jogo voxel modo criativo

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  github: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/

  integration_test:
    sdk: flutter

  e2e_pipeline_test:
    path: test/integration_test/e2e_test/e2e_pipeline_test.dart

  chunking_edge_cases_test:
    path: test/integration_test/chunking_test/chunking_edge_cases_test.dart

  memory_stress_test:
    path: test/integration_test/memory_stress_test/memory_stress_test.dart
