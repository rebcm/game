name: game
description: A voxel game built with Flutter.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.5
  flutter_i18n: ^0.32.0

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.21.4
  leak_tracker: ^9.0.0
  memory_info: ^0.2.0
  protobuf: ^2.1.0

flutter:
  assets:
    - docs/dicas_construcao/conteudo_dicas.md
    - docs/dicas_construcao/conteudo_dicas_formatado.md
    - docs/bloco_documentation.json
    - docs/seo/palavras-chave.md
    - docs/audio_compatibility/audio_compatibility_matrix.md
    - test/integration/contract/contract_test.dart
    - docs/cloudflare_pages_pipeline/minimum_permissions_matrix.md
    - .github/scripts/ci_validation/cloudflare_pages_permissions/docs/criterios_aceitacao_permissoes.md
    - docs/flutter_sdk_version.md
    - test/integration/documentacao/documentacao_test.dart
    - docs/gradle_jdk_mapping/gradle_jdk_compatibility.md
    - docs/i18n/pt-BR/dicas_construcao/conteudo_dicas.md
    - docs/i18n/en-US/dicas_construcao/conteudo_dicas.md
    - docs/i18n/pt-BR/bloco_documentation.json
    - docs/i18n/en-US/bloco_documentation.json
    - docs/i18n/pt-BR/seo/palavras-chave.md
    - docs/i18n/en-US/seo/palavras-chave.md
