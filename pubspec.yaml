dev_dependencies:
  flutter_lints: ^2.0.0
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  build_runner: ^2.3.3
  json_serializable: ^6.5.4
  markdown: ^4.0.0
  test: ^1.16.0
  flutter_test:
    sdk: flutter
  leak_tracker: ^9.0.0
  integration_test:
    path: test/responsividade
  freezed: ^2.3.2
  json_annotation: ^4.6.0
  http: ^0.13.5

dependencies:
  protobuf: ^2.1.0
  flutter:
    sdk: flutter
  yaml: ^3.1.0

flutter:
  generate: true
  assets:
    - assets/locale/
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf

localizationsDelegates:
  - AppLocalizationsDelegate()
  - GlobalMaterialLocalizations.delegate
  - GlobalWidgetsLocalizations.delegate

supportedLocales:
  - de
  - fr

  integration_test:
    path: test/integration_tests/ux_tests
