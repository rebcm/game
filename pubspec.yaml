name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  freezed_annotation: ^2.2.0
  json_annotation: ^4.6.0
  provider: ^6.0.3
  archive: ^3.3.0
  http: ^0.13.5
  audioplayers: ^1.0.1
  flutter:
    sdk: flutter
  assets:
    - assets/rebeca_animation.riv
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6
  crypto: ^3.0.2

dev_dependencies:
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0
  integration_test:
    sdk: flutter

flutter:
  assets:
    - assets/rebeca_animation.riv
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales

scripts:
  run_animation_integration_test: flutter drive --driver=test/integration_tests/animation_test/animation_test_driver.dart --target=test/integration_tests/animation_test/animation_test.dart
  run_build_runner: ./scripts/run_build_runner.sh
  run_checksum_test: bash scripts/run_checksum_test.sh
  run_state_validation_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/state_validation_test/state_validation_test.dart
  run_checksum_test: bash scripts/run_checksum_test.sh

  run_build_performance_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/performance_tests/build_performance_test.dart 
  run_app_startup_performance_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/performance_tests/app_startup_performance_test.dart

  run_rebeca_walk_benchmark: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/benchmarks/rebeca_walk_benchmark.dart
  run_interruption_test: flutter drive --driver=test/integration_tests/interruption_test/interruption_test_driver.dart --target=test/integration_tests/interruption_test/interruption_test.dart

  run_system_interruption_test: flutter drive --driver=test/integration_tests/system_interruption_test/system_interruption_test_driver.dart --target=test/integration_tests/system_interruption_test/system_interruption_test.dart

  run_lint_parser: bash scripts/lint_parser/parse_lint_logs.sh lint_results.json
scripts:
  run_ci_checks: bash scripts/run_ci_checks.sh

  run_acceptance_criteria_test: flutter drive --driver=test/integration_tests/acceptance_criteria_test/acceptance_criteria_test_driver.dart --target=test/integration_tests/acceptance_criteria_test/acceptance_criteria_test.dart
