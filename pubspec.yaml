name: game
description: A voxel game.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  protobuf: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  openapi_generator: ^4.3.1

flutter:
