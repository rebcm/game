name: game
description: A voxel game.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  http: ^0.13.5
  provider: ^6.0.3
  analyzer: ^5.2.0
  dio: ^4.0.6

  openapi_client:
    path: ./lib/openapi/client

dev_dependencies:
  test: ^1.21.4
  flutter_test:
    sdk: flutter
  http_mock_adapter: ^1.0.0
  dio_adapter: ^1.0.0

flutter:
  assets:
    - assets/translations/
    - lib/docs/
    - lib/docs/dicas/

  flutter_localizations:
    sdk: flutter
  intl: ^0.17.0

  uses-material-design: true
