name: rebcm
description: Explore e construa em um mundo voxel com Rebeca. Desbloqueie sua criatividade e construa estruturas incríveis em um ambiente de blocos voxel.

version: 1.0.0+10

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  http: ^0.13.5
  just_audio: ^0.9.34
  flutter_gl: ^1.0.0
  flutter_hooks: ^0.18.5
  equatable: ^2.0.3
  audio_service: ^0.18.9
  flutter:
    sdk: flutter
  flame: ^1.2.1  
  provider: ^6.0.3
  http: ^0.13.5
  intl: ^0.17.0
  json_annotation: ^4.6.0
  shared_preferences: ^2.1.1

dev_dependencies:
  http: ^0.13.5
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  build_runner: ^2.1.8
  json_serializable: ^6.3.1
  mocktail: ^0.3.0
  test: ^1.21.4

flutter:
  uses-material-design: true
  assets:
    - assets/blocos/
    - assets/audio/optimized/ambient/
    - assets/audio/optimized/music/
    - assets/docs/checklists/voice-tone-validation-checklist.md
    - assets/docs/checklists/onboarding-validation-checklist.md
    - assets/docs/guias/guia-estilo-tom-voz.md
    - assets/docs/checklists/revisao-texto-validation-checklist.md
    - assets/docs/checklists/criterios-mapeamento-canais-distribuicao-validation-checklist.md
    - assets/docs/checklists/criterios-mapeamento-canais-distribuicao.md
    - docs/artefatos/checklists/criterios-revisao-texto.md
    - assets/personagens/rebeca/rebeca.png
    - assets/docs/guias/guia-configuracao-secrets.md
    - assets/docs/guias/guia-configuracao-documentacao.md

  provider: ^6.0.3
  assets:
    - assets/docs/guias/guia-configuracao-documentacao.md

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
  assets:
    - assets/docs/guias/guia-diferenciacao-secrets-vars.md
