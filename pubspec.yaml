name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0

flutter:
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales
dependencies:
  flutter_i18n: ^0.32.0

scripts:
  coverage:test --coverage

scripts:
  coverage: bash scripts/generate_coverage_report.sh
scripts:
  update_erros_comuns_docs: bash scripts/update_erros_comuns_docs.sh
scripts:
  run_input_tests: bash scripts/run_input_tests.sh

  shortcuts_exceptions_test:
    path: test/shortcuts_exceptions_test
