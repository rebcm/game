name: rebcm
description: Explore e construa em um mundo voxel com Rebeca. Desbloqueie sua criatividade e construa estruturas incríveis em um ambiente de blocos voxel.

version: 1.0.0+14

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: "^3.0.0"

dependencies:
  flutter_driver:
    sdk: flutter
  dotenv: ^4.0.0
  http: ^0.13.5
  just_audio: ^0.9.34
  flutter_gl: ^1.0.0
  flutter_hooks: ^0.18.5
  equatable: ^2.0.3
  audio_service: ^0.18.9
  flame: ^1.2.1  
  provider: ^6.0.3
  intl: ^0.17.0
  json_annotation: ^4.6.0
  shared_preferences: ^2.1.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_leak_detector: ^2.0.1
  leak_tracker: ^9.0.0
  leak_tracker_flutter_testing: ^2.0.1
  test: ^1.21.4
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  http: ^0.13.5
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.8
  json_serializable: ^6.3.1
  mocktail: ^0.3.0

flutter:
  assets:
    - assets/audio/optimized/
    - assets/blocos/
    - assets/audio/optimized/ambient/
    - assets/audio/optimized/music/
    - assets/docs/checklists/onboarding-validation-checklist.md
    - assets/docs/guias/style_guide_pt_BR.md
    - assets/docs/guias/style_guide_pt_BR.md
    - docs/artefatos/checklists/onboarding-validation-criterios.md
    - docs/glossario/README.md
    - docs/guias/style_guide.md
    - docs/guias/style_guide.md
    - docs/guias/style_guide.md
    - docs/localizacao/lista_idiomas.md
    - .env
  uses-material-design: true

  test_secrets_validation:
    path: test/secrets_validation_test.dart

  cached_network_image: ^3.2.3
