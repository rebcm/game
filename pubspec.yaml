name: game
description: Construção Criativa da Rebeca - jogo voxel modo criativo

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter_dotenv: ^5.0.2
  quiver: ^3.2.1
  freezed_annotation: ^2.4.1
  flutter:
    sdk: flutter
  audioplayers: ^5.2.0
  mockito: ^5.4.4
  http: ^0.13.6
  ffmpeg_kit_flutter: ^4.5.1

dev_dependencies:
  flutter_dotenv: ^5.0.2
  quiver: ^3.2.1
  freezed: ^2.4.7
  build_runner: ^2.4.6
  freezed_annotation: ^2.4.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/

  benchmark:
    path: ./benchmarks

  fps_benchmark:
    path: ./benchmarks/fps_benchmark

  performance_baseline:
    path: ./benchmarks/performance_baseline

  performance_baseline_test:
    path: ./benchmarks/performance_baseline

  fps_stress_test:
    path: ./benchmarks/fps_stress_test

  integration_test_config:
    path: ./integration_test
