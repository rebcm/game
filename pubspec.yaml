name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  http: ^0.13.5
  freezed_annotation: ^2.2.0
  json_annotation: ^4.6.0
  provider: ^6.0.3
  archive: ^3.3.0
  http: ^0.13.5
  audioplayers: ^1.0.1
  flutter:
    sdk: flutter
  assets:
    - assets/rebeca_animation.riv
    - assets/texture.png
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6
  crypto: ^3.0.2
  leak_canary_flutter: ^2.0.0
  flutter_inappwebview: ^5.7.2+3

dev_dependencies:
  flutter_driver:
  http: ^0.13.5
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0
  integration_test:
    sdk: flutter

flutter:
  assets:
    - assets/rebeca_animation.riv
    - assets/audio/ 
    - assets/texture.png
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales

scripts:
  run_coverage_threshold_test: flutter test test/coverage_threshold/coverage_threshold_test.dart
  run_memory_test: ./scripts/run_memory_test.sh
  run_checksum_test: bash scripts/run_checksum_test.sh
  run_code_generation: dart run build_runner build --delete-conflicting-outputs
  run_animation_integration_test: flutter drive --driver=test/integration_tests/animation_test/animation_test_driver.dart --target=test/integration_tests/animation_test/animation_test.dart
  run_animation_performance_test: flutter drive --driver=test/integration_tests/animation_test/animation_test_driver.dart --target=test/integration_tests/animation_test/animation_test.dart --profile --trace-systrace --target-platform android
  run_build_runner: ./scripts/run_build_runner.sh
  run_state_validation_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/state_validation_test/state_validation_test.dart
  run_player_state_test: flutter drive --driver=test/integration_tests/player_state_test/player_state_test_driver.dart --target=test/integration_tests/player_state_test/player_state_test.dart
  run_memory_test: flutter drive --driver=test/integration_tests/memory_test/memory_test_driver.dart --target=test/integration_tests/memory_test/memory_test.dart
  run_lint_test: flutter drive --driver=test/integration_tests/lint_test/lint_test_driver.dart
  validate_installation_docs: bash scripts/validate_installation_docs.sh

  run_retry_timeout_test: ./scripts/run_retry_timeout_test.sh

  run_content_regression_test: ./scripts/run_content_regression_test.sh
  run_content_edge_cases_test: flutter drive --driver=test/integration_tests/content_edge_cases/content_edge_cases_driver.dart --target=test/integration_tests/content_edge_cases/content_edge_cases_test.dart

flutter_i18n:
  path: lib/i18n/locales
