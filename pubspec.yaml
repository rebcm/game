name: game
description: A voxel game built with Flutter.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  swagger: ^1.0.0

dev_dependencies:
    sdk: flutter
  flutter_driver:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.21.4
  leak_tracker: ^9.0.0
  memory_info: ^0.2.0
  http: ^0.13.5
  protobuf: ^2.1.0

flutter:
  assets:
    - docs/swagger_endpoints.md
    - docs/swagger_ui.html
    - docs/audio_api_comparativo/audio_api_comparativo.md
    - docs/dicas_construcao/conteudo_dicas.md
    - docs/audio_api_comparativo/audio_api_comparativo.md
    - .github/scripts/docs_validation/audio_comparativo/edge_cases_matrix.md
    - peer_review.md
    - docs/wrangler_secrets.md
    - docs/bloco_documentation.json
    - docs/seo/palavras-chave.md

  uses-material-design: true
    - docs/flujo_integracion/flujo_integracion.md
    - docs/flujo_integracion/flujo_integracion.md

  flutter:
    assets:
      - docs/documentacao.md

  flutter:
    assets:
      - test/integration_tests/audio_interruption_test/

  # No new dependencies needed

  flutter:
    assets:
      - integration_test/dicas_ui_test.dart
  flutter:
    assets:
      - docs/dicas_construcao/conteudo_dicas.md
  flutter:
    assets:
      - test/integration_tests/audio_interruption_test/

  flutter:
    assets:
      - docs/dicas_construcao/criterios_aceitacao_ui_dicas.md

  flutter:
    assets:
      - integration_test/latency_benchmark_test.dart

  flutter:
    assets:
      - test/integration_tests/audio_integration_test/
