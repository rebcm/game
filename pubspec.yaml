name: game
description: A voxel game.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  http: ^0.13.5
  provider: ^6.0.3
  analyzer: ^5.2.0
  dio: ^4.0.6

  openapi_client: ^0.3.0
  freezed: ^2.1.0
  json_annotation: ^4.6.0
  path: ./lib/openapi/client
  flutter_localizations:
    sdk: flutter
  intl: ^0.17.0

dev_dependencies:
  openapi_generator: ^4.3.1
  build_runner: ^2.2.0
  freezed_annotation: ^2.1.0
  json_serializable: ^6.3.1
  test: ^1.21.4
  flutter_test:
    sdk: flutter
  http_mock_adapter: ^1.0.0
  dio_adapter: ^1.0.0

flutter:
  assets:
    - assets/translations/
    - lib/docs/
    - lib/docs/guias_construcao/
    - lib/docs/dicas/
    - lib/docs/guias_construcao/

  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

  # No new dependencies needed for this task

  assets:
    - lib/docs/biomas/
