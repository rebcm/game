name: rebcm
description: Explore e construa em um mundo voxel com Rebeca. Desbloqueie sua criatividade e construa estruturas incríveis em um ambiente de blocos voxel.

version: 1.0.0+3

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  just_audio: ^0.9.34
  flutter_gl: ^1.0.0
  flutter_hooks: ^0.18.5
  equatable: ^2.0.3
  audio_service: ^0.18.9
  flutter:
    sdk: flutter
  flame: ^1.2.1  
  provider: ^6.0.3
  http: ^0.13.5
  intl: ^0.17.0
  json_annotation: ^4.6.0
  shared_preferences: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.1.8
  json_serializable: ^6.3.1
  mocktail: ^0.3.0
  test: ^1.21.4

flutter:
  assets:
    - assets/blocos/
    - assets/audio/optimized/ambient/
    - assets/audio/optimized/music/
  uses-material-design: true
  generate: true

  flutter:
    assets:
      - assets/blocos/
      - assets/audio/optimized/ambient/
      - assets/audio/optimized/music/
    uses-material-design: true
    generate: true
