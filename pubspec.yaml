name: game
description: Construção Criativa da Rebeca - jogo voxel modo criativo

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  quiver: ^3.2.1
  freezed_annotation: ^2.4.1
  flutter:
    sdk: flutter
  audioplayers: ^5.2.0
  mockito: ^5.4.4
  http: ^0.13.6

dev_dependencies:
  quiver: ^3.2.1
  freezed: ^2.4.7
