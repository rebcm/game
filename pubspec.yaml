name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  freezed_annotation: ^2.2.0
  json_annotation: ^4.6.0
  provider: ^6.0.3
  archive: ^3.3.0
  http: ^0.13.5
  audioplayers: ^1.0.1
  flutter:
    sdk: flutter
  assets:
    - assets/rebeca_animation.riv
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6
  crypto: ^3.0.2
  leak_canary_flutter: ^2.0.0

dev_dependencies:
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0
  integration_test:
    sdk: flutter

flutter:
  assets:
    - assets/rebeca_animation.riv
    - assets/audio/ 
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales

scripts:
  run_memory_test: ./scripts/run_memory_test.sh
  run_checksum_test: bash scripts/run_checksum_test.sh
  run_code_generation: dart run build_runner build --delete-conflicting-outputs
  run_animation_integration_test: flutter drive --driver=test/integration_tests/animation_test/animation_test_driver.dart --target=test/integration_tests/animation_test/animation_test.dart
  run_animation_performance_test: flutter drive --driver=test/integration_tests/animation_test/animation_test_driver.dart --target=test/integration_tests/animation_test/animation_test.dart
  run_build_runner: ./scripts/run_build_runner.sh
  run_state_validation_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/state_validation_test/state_validation_test.dart
  run_lint_test: flutter drive --driver=test/integration_tests/lint_test/lint_test_driver.dart --target=test/integration_tests/lint_test/lint_test.dart
  run_uv_map_test: flutter drive --driver=test/integration_tests/uv_map_test/uv_map_test_driver.dart --target=test/integration_tests/uv_map_test/uv_map_test.dart
  run_layout_test: flutter drive --driver=test/integration_tests/layout_test/layout_test_driver.dart --target=test/integration_tests/layout_test/layout_test.dart
  run_gc_test: flutter drive --driver=test/integration_tests/gc_test/gc_test_driver.dart --target=test/integration_tests/gc_test/gc_test.dart

  run_guia_construcao_test: flutter drive --driver=test/integration_tests/guia_construcao_test/guia_construcao_test_driver.dart --target=test/integration_tests/guia_construcao_test/guia_construcao_test.dart

  run_data_source_test: bash scripts/run_data_source_test.sh

  run_retention_test: bash scripts/run_retention_test.sh

  run_interruption_test: ./scripts/run_interruption_test.sh

scripts:
  validate_cloudflare_api: bash scripts/validate_cloudflare_api.sh
