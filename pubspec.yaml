name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0

flutter:
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales
dependencies:
  flutter_i18n: ^0.32.0

scripts:
  coverage:test --coverage

scripts:
  coverage: bash scripts/generate_coverage_report.sh
scripts:
  update_erros_comuns_docs: bash scripts/update_erros_comuns_docs.sh
scripts:
  run_input_tests: bash scripts/run_input_tests.sh

  shortcuts_exceptions_test:
    path: test/shortcuts_exceptions_test
scripts:
  run_memory_profiling_test: bash scripts/run_memory_profiling_test.sh

scripts:
  run_stress_tests: bash scripts/run_stress_tests.sh
scripts:
  run_floating_point_stress_tests: bash scripts/run_floating_point_stress_tests.sh
scripts:
  run_ci_cd_pipeline: bash scripts/run_ci_cd_pipeline.sh

scripts:
  coverage: bash scripts/generate_coverage_report.sh
scripts:
  run_input_validation_tests: bash scripts/run_input_validation_tests.sh
scripts:
  run_package_tracking_tests: bash scripts/run_package_tracking_tests.sh

scripts:
  run_package_tracking_tests: bash scripts/run_package_tracking_tests.sh

  api_test:
    path: test/api_tests/api_test.dart
  integration_test:
    path: test/integration_tests/integration_test.dart
  load_test:
    path: test/load_tests/load_test.dart

scripts:
  run_api_tests: flutter test test/api_tests/api_test.dart
  run_integration_tests: flutter drive --driver=test/integration_tests/integration_test_driver.dart --target=test/integration_tests/integration_test.dart
  run_load_tests: flutter test test/load_tests/load_test.dart
