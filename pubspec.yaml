name: construcao_criativa
description: "Construção Criativa da Rebeca — jogo de blocos voxel modo criativo"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  audioplayers: ^1.0.1
  driver_idle_animation:
  flutter:
  assets:
    - assets/sounds/
    sdk: flutter
  flame: ^1.21.0
  flame_audio: ^2.10.3
  vector_math: ^2.1.4
  shared_preferences: ^2.5.3
  http: ^1.3.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  audioplayers: ^1.0.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/sounds/
  - assets/images/rebeca.png
  uses-material-design: true
  assets:
    - assets/blocos/
    - assets/personagens/
    - assets/sons/
    - assets/ui/
  assets:
    - assets/audio/musica1.mp3
    - assets/audio/musica2.mp3
    - assets/audio/musica3.mp3
    - assets/audio/musica4.mp3
http: ^0.13.3
assets:
  - assets/audio/
deploy:
  script: ./scripts/deploy-cloudflare-pages.sh
