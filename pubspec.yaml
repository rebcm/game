name: game
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  provider: ^6.0.3
  archive: ^3.3.0
  http: ^0.13.5
  audioplayers: ^1.0.1
  flutter:
    sdk: flutter
  permission_handler: ^10.3.0
  lottie: ^2.3.2
  rive: ^0.10.6

dev_dependencies:
  provider: ^6.0.3
  archive: ^3.3.0
  http: ^0.13.5
  audioplayers: ^1.0.1
  flutter_test:
    sdk: flutter
  test: ^1.21.4
  lcov: ^0.14.0
  genhtml: ^0.1.0
  flutter_driver:
    sdk: flutter
  golden_toolkit: ^0.13.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_i18n:
  path: lib/i18n/locales

scripts:
  run_state_validation_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/integration_tests/state_validation_test/state_validation_test.dart

  run_global_shortcuts_test: flutter drive --driver=test/integration_tests/global_shortcuts_test/global_shortcuts_driver.dart --target=test/integration_tests/global_shortcuts_test/global_shortcuts_test.dart

  run_build_performance_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/performance_tests/build_performance_test.dart
  run_app_startup_performance_test: flutter drive --driver=test/integration_tests/integration_test_driver/integration_test_driver.dart --target=test/performance_tests/app_startup_performance_test.dart


  run_floating_point_precision_test: flutter drive --driver=test/stress_tests/floating_point_precision_test/floating_point_precision_driver.dart --target=test/stress_tests/floating_point_precision_test/floating_point_precision_test.dart

  run_suavidade_test: flutter drive --driver=test/integration_tests/suavidade_test/suavidade_driver.dart --target=test/integration_tests/suavidade_test/suavidade_test.dart

  run_onboarding_test: flutter drive --driver=test/integration_tests/onboarding_test/onboarding_driver.dart --target=test/integration_tests/onboarding_test/onboarding_test.dart
  run_secrets_test: flutter drive --driver=test/integration_tests/secrets_test/secrets_driver.dart --target=test/integration_tests/secrets_test/secrets_test.dart
