<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!--
    Cubo voxel isométrico no estilo Minecraft.
    - Topo: grama (#4CAF50) com pixels variados (ruído)
    - Lateral esquerda: terra clara (#8D6E63) com faixa verde superior
    - Lateral direita: terra escura (#6D4C41) com faixa verde superior
    - Contorno: traço preto fino para legibilidade em fundos claros
  -->

  <!-- Sombra suave embaixo -->
  <ellipse cx="32" cy="58" rx="22" ry="3" fill="#000" opacity="0.18"/>

  <!-- Lateral DIREITA (terra escura) -->
  <polygon points="32,36 56,22 56,46 32,60" fill="#5D4037"/>
  <!-- faixa de grama (transição topo) -->
  <polygon points="32,36 56,22 56,26 32,40" fill="#388E3C"/>
  <!-- variações em pixels (ruído de terra) -->
  <rect x="38" y="32" width="3" height="3" fill="#4E342E"/>
  <rect x="46" y="40" width="3" height="3" fill="#6D4C41"/>
  <rect x="50" y="34" width="2" height="2" fill="#3E2723"/>
  <rect x="42" y="50" width="3" height="3" fill="#4E342E"/>
  <rect x="36" y="46" width="2" height="2" fill="#3E2723"/>

  <!-- Lateral ESQUERDA (terra clara) -->
  <polygon points="32,36 8,22 8,46 32,60" fill="#8D6E63"/>
  <!-- faixa de grama (transição topo) -->
  <polygon points="32,36 8,22 8,26 32,40" fill="#43A047"/>
  <!-- variações em pixels -->
  <rect x="14" y="30" width="3" height="3" fill="#6D4C41"/>
  <rect x="22" y="40" width="3" height="3" fill="#A1887F"/>
  <rect x="12" y="42" width="2" height="2" fill="#5D4037"/>
  <rect x="20" y="50" width="3" height="3" fill="#6D4C41"/>
  <rect x="26" y="46" width="2" height="2" fill="#A1887F"/>

  <!-- TOPO (grama) -->
  <polygon points="32,8 56,22 32,36 8,22" fill="#4CAF50"/>
  <!-- ruído / tufos -->
  <rect x="22" y="16" width="3" height="3" fill="#388E3C"/>
  <rect x="36" y="14" width="3" height="3" fill="#66BB6A"/>
  <rect x="44" y="20" width="3" height="3" fill="#388E3C"/>
  <rect x="28" y="22" width="3" height="3" fill="#2E7D32"/>
  <rect x="40" y="26" width="3" height="3" fill="#66BB6A"/>
  <rect x="18" y="22" width="2" height="2" fill="#2E7D32"/>
  <rect x="32" y="18" width="2" height="2" fill="#66BB6A"/>
  <rect x="48" y="24" width="2" height="2" fill="#388E3C"/>

  <!-- Contornos finos -->
  <polygon points="32,8 56,22 32,36 8,22"   fill="none" stroke="#1B5E20" stroke-width="0.7"/>
  <polygon points="32,36 8,22 8,46 32,60"   fill="none" stroke="#3E2723" stroke-width="0.7"/>
  <polygon points="32,36 56,22 56,46 32,60" fill="none" stroke="#3E2723" stroke-width="0.7"/>
</svg>
