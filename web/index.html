<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Construcao Criativa da Rebeca - jogo voxel modo criativo">
  <meta name="theme-color" content="#4CAF50">
  <title>Construcao Criativa da Rebeca</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body { margin: 0; background-color: #1a1a2e; overflow: hidden; }
    #loading-spinner { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #0d47a1, #1b5e20); }
    .spinner { width: 60px; height: 60px; border: 5px solid #4CAF50; border-top: 5px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { color: white; margin-top: 20px; font-family: Arial, sans-serif; font-size: 18px; }
  </style>
</head>
<body>
  <div id="loading-spinner">
    <div style="text-align: center">
      <div class="spinner"></div>
      <div class="loading-text">Carregando Construcao Criativa...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
