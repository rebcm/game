weight:bold" onclick="tp()">Continuar</button><button style="background:linear-gradient(135deg,#c0392b,#922b21);color:#fff;border:none;padding:14px 40px;font-size:1.1em;border-radius:8px;cursor:pointer;font-weight:bold" onclick="location.reload()">Menu</button></div></div><script>const BL=[{n:'Grama',e:'🌿',t:'#4CAF50',s:'#2E7D32',f:'#388E3C'},{n:'Terra',e:'🌍',t:'#8D6E63',s:'#4E342E',f:'#6D4C41'},{n:'Areia',e:'🏖',t:'#FFEB3B',s:'#F9A825',f:'#FDD835'},{n:'Pedra',e:'🪨',t:'#9E9E9E',s:'#424242',f:'#616161'},{n:'Madeira',e:'🌲',t:'#795548',s:'#3E2723',f:'#4E342E'},{n:'Folha',e:'🌿',t:'#2E7D32',s:'#1B5E20',f:'#388E3C'},{n:'Agua',e:'💧',t:'#1565C0',s:'#0D47A1',f:'#1976D2'},{n:'Fogo',e:'🔥',t:'#FF5722',s:'#BF360C',f:'#E64A19'},{n:'Ouro',e:'⭐',t:'#FFD700',s:'#E65100',f:'#FF8F00'},{n:'Diamante',e:'💎',t:'#00BCD4',s:'#006064',f:'#00838F'},{n:'Vidro',e:'👁',t:'#B3E5FC77',s:'#4FC3F744',f:'#81D4FA55'},{n:'Neve',e:'❄',t:'#ECEFF1',s:'#B0BEC5',f:'#CFD8DC'}];const N=22,TW=56,TH=28,TD=20;let W=[],sb=0,cx=0,cy=0,pa=false,cv,ct,ai,dg=false,mx=0,my=0,cx0=0,cy0=0,pl=0,zm=1,pts=[];function iW(){const d=localStorage.getItem('ccr4');if(d){const p=JSON.parse(d);W=p.w;pl=p.p||0;}else{W=[];for(let x=0;x<N;x++){W[x]=[];for(let z=0;z<N;z++){const r=Math.random();W[x][z]=r<.35?0:r<.5?1:r<.62?2:r<.72?3:r<.8?4:r<.86?5:r<.9?6:-1;}}}}function sW(){localStorage.setItem('ccr4',JSON.stringify({w:W,p:pl}));}function ip(x,z){return{sx:cv.width/2+cx+(x-z)*TW*zm/2,sy:cv.height*.28+cy+(x+z)*TH*zm/2};}function dB(x,z,bi){const b=BL[bi],{sx,sy}=ip(x,z),tw=TW*zm/2,th=TH*zm/2,td=TD*zm;ct.beginPath();ct.moveTo(sx,sy-td);ct.lineTo(sx+tw,sy-td+th);ct.lineTo(sx,sy-td+th*2);ct.lineTo(sx-tw,sy-td+th);ct.closePath();ct.fillStyle=b.t;ct.fill();ct.strokeStyle='#0003';ct.lineWidth=.7;ct.stroke();ct.beginPath();ct.moveTo(sx+tw,sy-td+th);ct.lineTo(sx+tw,sy+th);ct.lineTo(sx,sy+th*2);ct.lineTo(sx,sy-td+th*2);ct.closePath();ct.fillStyle=b.f;ct.fill();ct.stroke();ct.beginPath();ct.moveTo(sx-tw,sy-td+th);ct.lineTo(sx,sy-td+th*2);ct.lineTo(sx,sy+th*2);ct.lineTo(sx-tw,sy+th);ct.closePath();ct.fillStyle=b.s;ct.fill();ct.stroke();}function dR(){const{sx,sy}=ip(N/2,N/2),sc=zm,rx=sx,ry=sy-TD*sc;ct.fillStyle='#FFD700';ct.fillRect(rx-7*sc,ry-32*sc,14*sc,8*sc);ct.fillStyle='#FFDBA9';ct.fillRect(rx-6*sc,ry-24*sc,12*sc,14*sc);ct.fillStyle='#9C27B0';ct.fillRect(rx-5*sc,ry-10*sc,10*sc,13*sc);ct.fillStyle='#3F51B5';ct.fillRect(rx-5*sc,ry+3*sc,4*sc,9*sc);ct.fillRect(rx+1*sc,ry+3*sc,4*sc,9*sc);ct.fillStyle='#FFDBA9';ct.fillRect(rx-8*sc,ry-8*sc,3*sc,8*sc);ct.fillRect(rx+5*sc,ry-8*sc,3*sc,8*sc);}function spP(sx,sy,col){for(let i=0;i<10;i++)pts.push({x:sx,y:sy,vx:(Math.random()-.5)*5,vy:-Math.random()*4-1,l:100,s:3+Math.random()*4,c:col});}function dP(){for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.l-=3;p.s*=.94;if(p.l<=0){pts.splice(i,1);continue;}ct.save();ct.globalAlpha=p.l/100;ct.fillStyle=p.c;ct.fillRect(p.x,p.y,p.s,p.s);ct.restore();}}const clds=Array.from({length:8},(_,i)=>({x:i*180+Math.random()*80,y:25+Math.sin(i)*20,r:50+Math.random()*40}));function render(){ct.clearRect(0,0,cv.width,cv.height);const g=ct.createLinearGradient(0,0,0,cv.height);g.addColorStop(0,'#87CEEB');g.addColorStop(.5,'#b3e5fc');g.addColorStop(1,'#dcedc8');ct.fillStyle=g;ct.fillRect(0,0,cv.width,cv.height);clds.forEach(cl=>{cl.x=(cl.x+.25)%cv.width;ct.save();ct.fillStyle='#ffffffaa';ct.beginPath();ct.ellipse(cl.x,cl.y,cl.r,cl.r*.38,0,0,Math.PI*2);ct.fill();ct.restore();});for(let x=0;x<N;x++)for(let z=0;z<N;z++){const b=W[x]?.[z];if(b!=null&&b>=0)dB(x,z,b);}dR();dP();}function sg(){document.getElementById('menu').style.display='none';document.getElementById('game').style.display='block';cv=document.getElementById('c');ct=cv.getContext('2d');iW();bTB();lp();}function lp(){if(!pa){cv.width=window.innerWidth;cv.height=window.innerHeight-84;render();ai=requestAnimationFrame(lp);}}function bTB(){const t=document.getElementById('tb');t.innerHTML='';BL.forEach((b,i)=>{const btn=document.createElement('div');btn.className='tb'+(i===sb?' sel':'');btn.style.background=b.t.replace(/[0-9a-f]{2}$/i,'');btn.innerHTML=b.e+'<div class="lb">'+b.n.substring(0,4)+'</div>';btn.onclick=()=>{sb=i;uS();};t.appendChild(btn);});}function uS(){document.querySelectorAll('.tb').forEach((e,j)=>e.className='tb'+(j===sb?' sel':''));document.getElementById('bn').textContent='Selecionado: '+BL[sb].n;}function tp(){pa=!pa;document.getElementById('ps').className=pa?'on':'';if(!pa)lp();else cancelAnimationFrame(ai);}document.addEventListener('keydown',e=>{if(e.key==='Escape')tp();const k='123456789',ki=k.indexOf(e.key);if(ki>=0&&ki<BL.length){sb=ki;uS();}});document.addEventListener('wheel',e=>{zm=Math.max(.3,Math.min(3,zm-e.deltaY*.001));},{ passive:true});document.addEventListener('mousedown',e=>{dg=true;mx=e.clientX;my=e.clientY;cx0=cx;cy0=cy;});document.addEventListener('mousemove',e=>{if(dg){cx=cx0+(e.clientX-mx);cy=cy0+(e.clientY-my);}});document.addEventListener('mouseup',e=>{if(dg){const dx=e.clientX-mx,dy=e.clientY-my;if(Math.abs(dx)<4&&Math.abs(dy)<4&&cv){const tw=TW*zm/2,th=TH*zm/2,bx=cv.width/2+cx,by=cv.height*.28+cy,ddx=e.clientX-bx,ddy=e.clientY-by,gx=Math.round((ddx/tw+ddy/th)/2),gz=Math.round((ddy/th-ddx/tw)/2);if(gx>=0&&gx<N&&gz>=0&&gz<N){const pv=W[gx][gz];W[gx][gz]=pv===sb?-1:sb;if(W[gx][gz]>=0){pl++;const{sx,sy}=ip(gx,gz);spP(sx,sy-TD*zm,BL[sb].t);}else pl=Math.max(0,pl-1);document.getElementById('sc').textContent='Blocos: '+pl;sW();}}}dg=false;});document.addEventListener('touchstart',e=>{if(e.touches.length===1){dg=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;cx0=cx;cy0=cy;}},{passive:true});document.addEventListener('touchmove',e=>{if(dg&&e.touches.length===1){cx=cx0+(e.touches[0].clientX-mx);cy=cy0+(e.touches[0].clientY-my);}},{passive:true});document.addEventListener('touchend',e=>{if(dg&&e.changedTouches.length===1){const t=e.changedTouches[0],dx=t.clientX-mx,dy=t.clientY-my;if(Math.abs(dx)<10&&Math.abs(dy)<10&&cv){const tw=TW*zm/2,th=TH*zm/2,bx=cv.width/2+cx,by=cv.height*.28+cy,ddx=t.clientX-bx,ddy=t.clientY-by,gx=Math.round((ddx/tw+ddy/th)/2),gz=Math.round((ddy/th-ddx/tw)/2);if(gx>=0&&gx<N&&gz>=0&&gz<N){const pv=W[gx][gz];W[gx][gz]=pv===sb?-1:sb;if(W[gx][gz]>=0){pl++;const{sx,sy}=ip(gx,gz);spP(sx,sy-TD*zm,BL[sb].t);}else pl=Math.max(0,pl-1);document.getElementById('sc').textContent='Blocos: '+pl;sW();}}}dg=false;});window.addEventListener('resize',()=>{if(cv){cv.width=window.innerWidth;cv.height=window.innerHeight-84;}});</script></body></html>
